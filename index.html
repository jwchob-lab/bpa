<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무자동화</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:      #f2ece3;
  --surface: #ffffff;
  --border:  #e0d8cc;
  --accent:  #7c5c3a;
  --text:    #2e2318;
  --muted:   #a0907e;
  --hover:   rgba(124,92,58,0.07);
  --active:  rgba(124,92,58,0.13);
  --found:   #3a7c5c;
  --danger:  #c0392b;
  --sidebar: 260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  height: 100vh;
}

/* ?? 사이드바 ?? */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-logo {
  padding: 24px 22px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.5;
}
.sidebar-logo .ver {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 6px;
}

/* ── 로딩 상태 표시 ── */
.json-status {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
  background: var(--bg);
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.ok     { background: var(--found); box-shadow: 0 0 6px var(--found); }
.status-dot.error  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
.status-dot.loading {
  background: var(--accent);
  animation: pulse 1s ease infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; } 50% { opacity: 0.3; }
}

.btn-reload {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.78rem;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.2s;
  line-height: 1;
}
.btn-reload:hover { color: var(--accent); }

/* ── 홈으로 버튼 ── */
.btn-home {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 22px;
  margin: 10px 12px 2px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
  flex-shrink: 0;
}
.btn-home:hover {
  background: var(--hover);
  border-color: var(--accent);
}
.btn-home .home-icon {
  font-size: 0.85rem;
  color: var(--muted);
  flex-shrink: 0;
}
.btn-home .home-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  color: var(--muted);
}
.btn-home:hover .home-icon,
.btn-home:hover .home-label { color: var(--accent); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 16px;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.nav-section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 10px 22px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 22px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s;
  user-select: none;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active {
  background: var(--active);
  border-left-color: var(--accent);
}
.nav-icon {
  font-size: 0.85rem;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  color: var(--muted);
}
.nav-item.active .nav-icon { color: var(--accent); }
.nav-label {
  font-size: 0.84rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.nav-item.active .nav-label { color: var(--accent); font-weight: 700; }

.nav-empty {
  padding: 20px 22px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.7;
}
.nav-empty code {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.72rem;
}

/* ?? 메인 뷰어 ?? */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  height: 48px;
  min-height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-url {
  flex: 1;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn-newtab {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.73rem;
  color: var(--muted);
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
  display: none;
}
.btn-newtab:hover { border-color: var(--accent); color: var(--accent); }
.btn-newtab.visible { display: inline-block; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.empty-icon { font-size: 2.6rem; opacity: 0.25; }
.empty-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.82rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  opacity: 0.7;
}

#viewer {
  flex: 1;
  width: 100%;
  border: none;
  display: none;
  background: var(--bg);
}

/* ── 컨텍스트 메뉴 ── */
.ctx-menu {
  position: fixed;
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 0;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(46,35,24,0.12);
  min-width: 140px;
}
.ctx-menu.open { display: block; animation: fadeUp 0.12s ease both; }
.ctx-item {
  padding: 8px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--hover); }
.ctx-item.danger { color: var(--danger); }

/* ── 토스트 ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  padding: 9px 20px;
  border-radius: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 99999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--found); }
.toast.error   { background: var(--danger); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ?? 사이드바 ?? -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1><br># 업무자동화 #</h1>
    <div class="ver">v20260323 &nbsp;·&nbsp; by jwcho</div>
  </div>

  <!-- JSON 상태 표시 -->
  <div class="json-status">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">links.json 로딩 중...</span>
    <button class="btn-reload" title="다시 불러오기" onclick="loadLinksFromJSON()">reload</button>
  </div>

  <!-- 홈으로 버튼 -->
  <button class="btn-home" onclick="goHome()">
    <span class="home-icon">></span>
    <span class="home-label">HOME</span>
  </button>

  <nav class="sidebar-nav" id="navList"></nav>
</aside>

<!-- ?? 메인 ?? -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topTitle">왼쪽 링크를 선택하세요</span>
    <span class="topbar-url"   id="topUrl"></span>
    <a class="btn-newtab" id="btnNewTab" href="#" target="_blank">↗ 새탭</a>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">?</div>
    <div class="empty-text">LEFT MENU → SELECT LINK</div>
  </div>

  <iframe id="viewer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
  </iframe>
</div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxNewTab()">↗ 새탭에서 열기</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────
   상태
───────────────────────────────────── */
let links    = [];
let activeId = null;
let ctxId    = null;

function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─────────────────────────────────────
   토스트
───────────────────────────────────── */
let toastTimer = null;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (type ? " " + type : "");
  void el.offsetWidth;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

/* ─────────────────────────────────────
   JSON 자동 로드 (fetch)
───────────────────────────────────── */
function setStatus(state, text) {
  const dot  = document.getElementById("statusDot");
  const span = document.getElementById("statusText");
  dot.className    = "status-dot " + state;
  span.textContent = text;
}

async function loadLinksFromJSON() {
  setStatus("loading", "links.json 로딩 중...");
  try {
    const res = await fetch("./links.json?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    const imported = Array.isArray(data) ? data : (data.links || []);
    links = imported.map(l => ({
      id:    l.id    || uid(),
      label: l.label || l.url,
      url:   l.url
    }));

    setStatus("ok", `links.json  ·  ${links.length}개`);
    renderNav();
  } catch (err) {
    setStatus("error", "links.json 없음");
    links = [];
    renderNav();
    console.warn("[BPA] links.json 로드 실패:", err.message);
  }
}

/* ─────────────────────────────────────
   홈으로
───────────────────────────────────── */
function goHome() {
  activeId = null;
  renderNav();

  document.getElementById("topTitle").textContent = "왼쪽 링크를 선택하세요";
  document.getElementById("topUrl").textContent   = "";

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = "#";
  btnTab.classList.remove("visible");

  const iframe = document.getElementById("viewer");
  iframe.style.display = "none";
  iframe.src = "about:blank";

  document.getElementById("emptyState").style.display = "";
}

/* ─────────────────────────────────────
   렌더링
───────────────────────────────────── */
function renderNav() {
  const nav = document.getElementById("navList");
  nav.innerHTML = "";

  if (!links.length) {
    nav.innerHTML = `
      <div class="nav-empty">
        링크가 없습니다.<br><br>
        root에 <code>links.json</code> 파일을<br>
        추가하고 reload 버튼을 눌러주세요.
      </div>`;
    return;
  }

  const sec = document.createElement("div");
  sec.className = "nav-section-title";
  sec.textContent = "LINKS";
  nav.appendChild(sec);

  links.forEach(link => {
    const item = document.createElement("div");
    item.className = "nav-item" + (link.id === activeId ? " active" : "");
    item.innerHTML = `
      <span class="nav-icon">◈</span>
      <span class="nav-label" title="${esc(link.url)}">${esc(link.label)}</span>
    `;
    item.addEventListener("click", () => openLink(link.id));
    item.addEventListener("contextmenu", e => showCtx(e, link.id));
    nav.appendChild(item);
  });
}

/* ─────────────────────────────────────
   링크 열기
───────────────────────────────────── */
function openLink(id) {
  const link = links.find(l => l.id === id);
  if (!link) return;
  activeId = id;
  renderNav();

  document.getElementById("topTitle").textContent = link.label;
  document.getElementById("topUrl").textContent   = link.url;

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = link.url;
  btnTab.classList.add("visible");

  document.getElementById("emptyState").style.display = "none";
  const iframe = document.getElementById("viewer");
  iframe.style.display = "block";
  iframe.src = link.url;
}

/* ─────────────────────────────────────
   컨텍스트 메뉴 (우클릭)
───────────────────────────────────── */
function showCtx(e, id) {
  e.preventDefault();
  ctxId = id;
  const menu = document.getElementById("ctxMenu");
  menu.style.left = e.clientX + "px";
  menu.style.top  = e.clientY + "px";
  menu.classList.add("open");
}
function closeCtx() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxId = null;
}
function ctxNewTab() {
  const link = links.find(l => l.id === ctxId);
  if (link) window.open(link.url, "_blank");
  closeCtx();
}

/* ─────────────────────────────────────
   전역 이벤트
───────────────────────────────────── */
document.addEventListener("click", e => {
  if (!document.getElementById("ctxMenu").contains(e.target)) closeCtx();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeCtx();
});

/* ─────────────────────────────────────
   초기화 ? JSON 자동 로드
───────────────────────────────────── */
loadLinksFromJSON();
</script>
</body>
</html>
