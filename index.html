<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무자동화</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:      #f2ece3;
  --surface: #ffffff;
  --border:  #e0d8cc;
  --accent:  #7c5c3a;
  --text:    #2e2318;
  --muted:   #a0907e;
  --hover:   rgba(124,92,58,0.07);
  --active:  rgba(124,92,58,0.13);
  --found:   #3a7c5c;
  --danger:  #c0392b;
  --sidebar: 260px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  height: 100vh;
}

/* ?? 사이드바 ?? */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-logo {
  padding: 24px 22px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1.5;
}
.sidebar-logo .ver {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 6px;
}

/* ── JSON 내보내기/불러오기 툴바 ── */
.json-toolbar {
  display: flex;
  gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.btn-json {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  text-align: center;
  white-space: nowrap;
}
.btn-json:hover { border-color: var(--accent); color: var(--accent); }
.btn-json.export { }
.btn-json.import { }

/* 불러오기용 hidden input */
#jsonFileInput { display: none; }

/* ── 토스트 알림 ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  padding: 9px 20px;
  border-radius: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 99999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--found); }
.toast.error   { background: var(--danger); }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0 16px;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.nav-section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 10px 22px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 22px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s;
  user-select: none;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active {
  background: var(--active);
  border-left-color: var(--accent);
}
.nav-icon {
  font-size: 0.85rem;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
  color: var(--muted);
}
.nav-item.active .nav-icon { color: var(--accent); }
.nav-label {
  font-size: 0.84rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.nav-item.active .nav-label { color: var(--accent); font-weight: 700; }

.nav-empty {
  padding: 20px 22px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

/* ── 링크 추가 영역 ── */
.sidebar-add {
  flex-shrink: 0;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
}

.btn-add-toggle {
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  text-align: left;
}
.btn-add-toggle:hover { border-color: var(--accent); color: var(--accent); }

.add-form {
  display: none;
  margin-top: 10px;
}
.add-form.open { display: block; animation: fadeUp 0.18s ease both; }

.add-form input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--text);
  outline: none;
  margin-bottom: 6px;
  transition: border-color 0.2s;
}
.add-form input:focus { border-color: var(--accent); }
.add-form input::placeholder { color: var(--muted); }

.add-form-row { display: flex; gap: 6px; }

.btn-confirm {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 7px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-confirm:hover { opacity: 0.85; }

.btn-cancel {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
  transition: border-color 0.2s;
}
.btn-cancel:hover { border-color: var(--accent); }

/* ?? 메인 뷰어 ?? */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  height: 48px;
  min-height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}
.topbar-url {
  flex: 1;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn-newtab {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.73rem;
  color: var(--muted);
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
  white-space: nowrap;
  display: none;
}
.btn-newtab:hover { border-color: var(--accent); color: var(--accent); }
.btn-newtab.visible { display: inline-block; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.empty-icon { font-size: 2.6rem; opacity: 0.25; }
.empty-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.82rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  opacity: 0.7;
}

#viewer {
  flex: 1;
  width: 100%;
  border: none;
  display: none;
  background: var(--bg);
}

/* ── 컨텍스트 메뉴 ── */
.ctx-menu {
  position: fixed;
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 0;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(46,35,24,0.12);
  min-width: 140px;
  animation: fadeUp 0.12s ease both;
}
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 8px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--hover); }
.ctx-item.danger { color: var(--danger); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ?? 사이드바 ?? -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1><br># 업무자동화 #</h1>
    <div class="ver">v20260323 &nbsp;·&nbsp; by jwcho</div>
  </div>

  <!-- JSON 내보내기 / 불러오기 -->
  <div class="json-toolbar">
    <button class="btn-json export" onclick="exportJSON()">↓ JSON 저장</button>
    <button class="btn-json import" onclick="document.getElementById('jsonFileInput').click()">↑ JSON 불러오기</button>
    <input type="file" id="jsonFileInput" accept=".json" onchange="importJSON(event)">
  </div>

  <nav class="sidebar-nav" id="navList"></nav>

  <div class="sidebar-add">
    <button class="btn-add-toggle" onclick="toggleForm()">+ 링크 추가</button>
    <div class="add-form" id="addForm">
      <input type="text" id="inputLabel" placeholder="이름  (ex: 구글)">
      <input type="text" id="inputUrl"   placeholder="URL  (ex: https://google.com)">
      <div class="add-form-row">
        <button class="btn-confirm" onclick="addLink()">추가</button>
        <button class="btn-cancel"  onclick="toggleForm()">취소</button>
      </div>
    </div>
  </div>
</aside>

<!-- ?? 메인 ?? -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topTitle">왼쪽 링크를 선택하세요</span>
    <span class="topbar-url"   id="topUrl"></span>
    <a class="btn-newtab" id="btnNewTab" href="#" target="_blank">↗ 새탭</a>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">?</div>
    <div class="empty-text">LEFT MENU → SELECT LINK</div>
  </div>

  <iframe id="viewer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
  </iframe>
</div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxNewTab()">↗ 새탭에서 열기</div>
  <div class="ctx-item danger" onclick="ctxDelete()">? 삭제</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────
   상태 & 스토리지
───────────────────────────────────── */
const KEY = "bpa_links_v2";
let links    = [];
let activeId = null;
let ctxId    = null;

function save() { localStorage.setItem(KEY, JSON.stringify(links)); }
function load() {
  try { links = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { links = []; }
}
function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ─────────────────────────────────────
   토스트
───────────────────────────────────── */
let toastTimer = null;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (type ? " " + type : "");
  // force reflow
  void el.offsetWidth;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

/* ─────────────────────────────────────
   JSON 내보내기
───────────────────────────────────── */
function exportJSON() {
  if (!links.length) { showToast("저장할 링크가 없습니다", "error"); return; }
  const data = JSON.stringify({ bpa_version: "1", links }, null, 2);
  const blob = new Blob([data], { type: "application/json;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = "bpa_links.json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("? JSON 파일로 저장됐습니다", "success");
}

/* ─────────────────────────────────────
   JSON 불러오기
───────────────────────────────────── */
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // 배열 직접이거나 {links:[]} 형태 모두 허용
      const imported = Array.isArray(parsed) ? parsed : (parsed.links || []);
      if (!imported.length) { showToast("링크 데이터가 없습니다", "error"); return; }
      // id 없는 항목엔 자동 부여
      links = imported.map(l => ({ id: l.id || uid(), label: l.label || l.url, url: l.url }));
      save();
      renderNav();
      showToast(`? ${links.length}개 링크를 불러왔습니다`, "success");
    } catch {
      showToast("JSON 파싱 실패 ? 올바른 파일인지 확인하세요", "error");
    }
    // 같은 파일 재선택 허용
    event.target.value = "";
  };
  reader.readAsText(file);
}

/* ─────────────────────────────────────
   렌더링
───────────────────────────────────── */
function renderNav() {
  const nav = document.getElementById("navList");
  nav.innerHTML = "";

  if (!links.length) {
    nav.innerHTML = `<div class="nav-empty">링크가 없습니다</div>`;
    return;
  }

  const sec = document.createElement("div");
  sec.className = "nav-section-title";
  sec.textContent = "LINKS";
  nav.appendChild(sec);

  links.forEach(link => {
    const item = document.createElement("div");
    item.className = "nav-item" + (link.id === activeId ? " active" : "");
    item.innerHTML = `
      <span class="nav-icon">◈</span>
      <span class="nav-label" title="${esc(link.url)}">${esc(link.label)}</span>
    `;
    item.addEventListener("click", () => openLink(link.id));
    item.addEventListener("contextmenu", e => showCtx(e, link.id));
    nav.appendChild(item);
  });
}

/* ─────────────────────────────────────
   링크 열기
───────────────────────────────────── */
function openLink(id) {
  const link = links.find(l => l.id === id);
  if (!link) return;
  activeId = id;
  renderNav();

  document.getElementById("topTitle").textContent = link.label;
  document.getElementById("topUrl").textContent   = link.url;

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = link.url;
  btnTab.classList.add("visible");

  document.getElementById("emptyState").style.display = "none";
  const iframe = document.getElementById("viewer");
  iframe.style.display = "block";
  iframe.src = link.url;
}

/* ─────────────────────────────────────
   링크 추가
───────────────────────────────────── */
function toggleForm() {
  const form = document.getElementById("addForm");
  const open = form.classList.toggle("open");
  if (open) {
    document.getElementById("inputLabel").value = "";
    document.getElementById("inputUrl").value   = "";
    document.getElementById("inputLabel").focus();
  }
}

function addLink() {
  let label = document.getElementById("inputLabel").value.trim();
  let url   = document.getElementById("inputUrl").value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  if (!label) label = url;

  links.push({ id: uid(), label, url });
  save();
  renderNav();
  document.getElementById("addForm").classList.remove("open");
  showToast(`? "${label}" 추가됨`, "success");
}

/* ─────────────────────────────────────
   컨텍스트 메뉴 (우클릭)
───────────────────────────────────── */
function showCtx(e, id) {
  e.preventDefault();
  ctxId = id;
  const menu = document.getElementById("ctxMenu");
  menu.style.left = e.clientX + "px";
  menu.style.top  = e.clientY + "px";
  menu.classList.add("open");
}
function closeCtx() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxId = null;
}
function ctxNewTab() {
  const link = links.find(l => l.id === ctxId);
  if (link) window.open(link.url, "_blank");
  closeCtx();
}
function ctxDelete() {
  const link = links.find(l => l.id === ctxId);
  links = links.filter(l => l.id !== ctxId);
  if (activeId === ctxId) {
    activeId = null;
    document.getElementById("viewer").style.display = "none";
    document.getElementById("emptyState").style.display = "";
    document.getElementById("topTitle").textContent = "? 링크를 선택하세요 ?";
    document.getElementById("topUrl").textContent   = "";
    document.getElementById("btnNewTab").classList.remove("visible");
  }
  save();
  renderNav();
  closeCtx();
  if (link) showToast(`"${link.label}" 삭제됨`);
}

/* ─────────────────────────────────────
   전역 이벤트
───────────────────────────────────── */
document.addEventListener("click", e => {
  if (!document.getElementById("ctxMenu").contains(e.target)) closeCtx();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    closeCtx();
    document.getElementById("addForm").classList.remove("open");
  }
  if (e.key === "Enter" && document.getElementById("addForm").classList.contains("open")) {
    addLink();
  }
});

/* ─────────────────────────────────────
   초기화
───────────────────────────────────── */
load();
renderNav();
</script>
</body>
</html>
