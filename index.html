<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA</title>

<script src="./links.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./theme.css">

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   레이아웃
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --sidebar: 272px;
  --topbar:  48px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  height: 100vh;
  word-break: keep-all;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   사이드바
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 로고 ── */
.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg {
  width: 18px;
  height: 18px;
  fill: #fff;
}
.logo-text h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1.3;
}
.logo-text .ver {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 2px;
}

/* ── 상태바 ── */
.json-status {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
  background: var(--surface-2);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.ok      { background: var(--found); box-shadow: 0 0 5px var(--found); }
.status-dot.error   { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
.status-dot.loading { background: var(--accent); animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.btn-reload {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.68rem;
  font-family: 'IBM Plex Mono', monospace;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.btn-reload:hover { color: var(--accent); background: var(--hover); }

/* ── 빠른 버튼 그룹 ── */
.quick-btns {
  display: flex;
  gap: 6px;
  padding: 10px 12px 6px;
  flex-shrink: 0;
}
.quick-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  user-select: none;
}
.quick-btn:hover  { background: var(--hover); border-color: var(--accent-2); color: var(--accent); }
.quick-btn.active { background: var(--active); border-color: var(--accent); color: var(--accent); }
.quick-btn .q-icon { font-size: 0.82rem; }

/* ── 검색 ── */
.sidebar-search {
  padding: 6px 12px 8px;
  flex-shrink: 0;
}
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 10px;
  font-size: 0.78rem;
  color: var(--muted);
  pointer-events: none;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px 7px 30px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.82rem;
  font-family: "Noto Sans KR", sans-serif;
  color: var(--text);
  transition: all 0.2s;
  outline: none;
}
.sidebar-search input::placeholder { color: var(--muted); }
.sidebar-search input:focus {
  border-color: var(--accent-2);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(201,100,66,0.1);
}

/* ── 네비게이션 ── */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0 16px;
}
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.sidebar-nav::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── 카테고리 헤더 ── */
.cat-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px 8px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  border-radius: 6px;
  margin: 4px 6px 0;
}
.cat-header:hover { background: var(--hover); }

.cat-icon {
  font-size: 0.9rem;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.cat-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.01em;
}
.cat-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 1px 7px;
  flex-shrink: 0;
}
.cat-arrow {
  font-size: 0.6rem;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.22s ease;
}
.cat-header.open .cat-arrow { transform: rotate(90deg); }

/* ── 카테고리 내용 ── */
.cat-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
}
.cat-body.open { max-height: 2000px; }

/* ── 서브 카테고리 헤더 ── */
.subcat-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 6px 34px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  border-radius: 6px;
  margin: 1px 6px 0;
}
.subcat-header:hover { background: var(--hover); }
.subcat-label {
  font-size: 0.77rem;
  font-weight: 500;
  color: var(--muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.subcat-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  flex-shrink: 0;
}
.subcat-arrow {
  font-size: 0.55rem;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.subcat-header.open .subcat-arrow { transform: rotate(90deg); }

/* ── 서브 카테고리 내용 ── */
.subcat-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.22s cubic-bezier(0.4,0,0.2,1);
}
.subcat-body.open { max-height: 1000px; }

/* ── 네비 아이템 ── */
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px 7px 44px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
  border-radius: 6px;
  margin: 1px 6px;
  border-left: 2px solid transparent;
}
/* 서브카테 없이 카테고리 직속 아이템 */
.cat-body > .nav-item {
  padding-left: 36px;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active {
  background: var(--active);
  border-left-color: var(--accent);
}
.nav-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.nav-item.active .nav-dot { background: var(--accent); }
.nav-label {
  font-size: 0.82rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  line-height: 1.4;
}
.nav-item.active .nav-label { color: var(--accent); font-weight: 600; }
.nav-item:hover .nav-dot { background: var(--accent-2); }

/* ── 플랫 리스트 (카테고리 없을 때) ── */
.nav-section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 10px 16px 5px;
}
.nav-empty {
  padding: 20px 16px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.73rem;
  color: var(--muted);
  line-height: 1.8;
}
.nav-empty code {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.7rem;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   메인 뷰어
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  height: var(--topbar);
  min-height: var(--topbar);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
  flex-shrink: 0;
}
.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  min-width: 0;
}
.topbar-cat {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 400;
}
.topbar-sep {
  font-size: 0.7rem;
  color: var(--border);
}
.topbar-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
.topbar-url {
  flex: 1;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}
.btn-newtab {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
  display: none;
  flex-shrink: 0;
}
.btn-newtab:hover { border-color: var(--accent); color: var(--accent); background: var(--hover); }
.btn-newtab.visible { display: inline-block; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   빈 화면
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: var(--bg);
}
.empty-icon { font-size: 2.4rem; opacity: 0.2; }
.empty-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  opacity: 0.7;
}

#viewer {
  flex: 1;
  width: 100%;
  border: none;
  display: none;
  background: var(--bg);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   컨텍스트 메뉴
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ctx-menu {
  position: fixed;
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(26,23,20,0.12), 0 2px 6px rgba(26,23,20,0.06);
  min-width: 150px;
}
.ctx-menu.open { display: block; animation: fadeUp 0.12s ease both; }
.ctx-item {
  padding: 8px 12px;
  font-size: 0.82rem;
  color: var(--text);
  cursor: pointer;
  transition: background 0.1s;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctx-item:hover { background: var(--hover); }
.ctx-item.danger { color: var(--danger); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   토스트
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: #fff;
  font-family: "Noto Sans KR", sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  padding: 9px 20px;
  border-radius: 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 99999;
  white-space: nowrap;
}
.toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--found); }
.toast.error   { background: var(--danger); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   메인화면 터미널 캐릭터
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.terminal-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 580px;
  margin: 0 auto;
}
.terminal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(26,23,20,0.08);
  width: 100%;
}
.terminal-titlebar {
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.t-dot { width: 11px; height: 11px; border-radius: 50%; }
.t-dot.red    { background: #ff5f57; }
.t-dot.yellow { background: #ffbd2e; }
.t-dot.green  { background: #28c841; }
.terminal-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: 6px;
}
.terminal-body {
  padding: 22px 24px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  line-height: 1.9;
  color: var(--text);
}
.t-comment { color: var(--muted); }
.t-prompt  { color: var(--accent); }
.t-task    {
  color: var(--text);
  font-weight: 500;
}
.t-task::after {
  content: "데이터 수집 시작 중...";
  animation: autoFlow 10s infinite step-end;
}
@keyframes autoFlow {
  0%   { content: "데이터 수집 시작 중..."; }
  20%  { content: "Excel 보고서 자동 생성..."; }
  40%  { content: "이메일 발송 대상 확인 중..."; }
  60%  { content: "클라우드 스토리지 동기화..."; }
  80%  { content: "로그 파일 저장 완료."; }
  100% { content: "다음 스케줄 대기 중..."; }
}
.t-cursor {
  color: var(--accent);
  font-weight: bold;
  animation: blink 0.8s step-start infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.t-progress {
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.78rem;
}
.t-bar { color: var(--accent); }
</style>
</head>
<body>

<!-- ▶ 사이드바 -->
<aside class="sidebar">

  <!-- 로고 -->
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>BPA</h1>
      <div class="ver">by jwcho</div>
    </div>
  </div>

  <!-- 상태 표시 -->
  <div class="json-status">
    <span class="status-dot loading" id="statusDot"></span>
    <span id="statusText">links.js 로딩 중...</span>
    <button class="btn-reload" title="다시 불러오기" onclick="loadLinksFromJS()">↻ reload</button>
  </div>

  <!-- 빠른 버튼 -->
  <div class="quick-btns">
    <button class="quick-btn" onclick="goHome()">
      <span class="q-icon">⌂</span> HOME
    </button>
    <button class="quick-btn" id="btnHelp" onclick="goHelp()">
      <span class="q-icon">?</span> HELP
    </button>
  </div>

  <!-- 검색 -->
  <div class="sidebar-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="navSearch" placeholder="링크 검색..." oninput="filterNav(this.value)">
    </div>
  </div>

  <!-- 네비게이션 목록 -->
  <nav class="sidebar-nav" id="navList"></nav>
</aside>

<!-- ▶ 메인 -->
<div class="main">
  <div class="topbar">
    <div class="topbar-breadcrumb">
      <span class="topbar-cat" id="topCat"></span>
      <span class="topbar-sep" id="topSep"></span>
      <span class="topbar-title" id="topTitle">BPA</span>
    </div>
    <span class="topbar-url" id="topUrl"></span>
    <a class="btn-newtab" id="btnNewTab" href="#" target="_blank">↗ 새탭</a>
  </div>

  <!-- 빈 상태 / 홈 화면 -->
  <div class="empty-state" id="emptyState">
    <div class="terminal-wrap">
      <div class="terminal-box">
        <div class="terminal-titlebar">
          <span class="t-dot red"></span>
          <span class="t-dot yellow"></span>
          <span class="t-dot green"></span>
          <span class="terminal-title">bpa — zsh</span>
        </div>
        <div class="terminal-body">
          <div class="t-comment">// System: BPA_Running</div>
          <div class="t-comment">// Status: Task_Active</div>
          <br>
          <div><span class="t-prompt">$ </span><span class="t-task"></span><span class="t-cursor">█</span></div>
          <div class="t-progress">
            <span class="t-bar">████████████████████░░░░</span> 85%
          </div>
          <br>
          <div class="t-comment">← 왼쪽 메뉴에서 링크를 선택하세요</div>
        </div>
      </div>
    </div>
  </div>

  <iframe id="viewer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
  </iframe>
</div>

<!-- 컨텍스트 메뉴 -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxNewTab()">↗ 새탭에서 열기</div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   상태
═══════════════════════════════════════════ */
let links    = [];   // [{id, label, url, category, subcategory}]
let activeId = null;
let ctxId    = null;

/* ─ 카테고리 접힘 상태 기억 ─ */
const catOpen    = {};  // catOpen[catKey]    = true/false
const subcatOpen = {};  // subcatOpen[subKey] = true/false

function uid() { return Math.random().toString(36).slice(2, 9); }
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ═══════════════════════════════════════════
   토스트
═══════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (type ? " " + type : "");
  void el.offsetWidth;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

/* ═══════════════════════════════════════════
   상태 표시
═══════════════════════════════════════════ */
function setStatus(state, text) {
  const dot  = document.getElementById("statusDot");
  const span = document.getElementById("statusText");
  dot.className    = "status-dot " + state;
  span.textContent = text;
}

/* ═══════════════════════════════════════════
   links.js 로드
   LINKS_DATA 구조:
     A) 배열: [{id,label,url}]
     B) 카테고리: [{category:"이름", icon:"🔧", links:[{id,label,url,subcategory:"서브"}]}]
     C) 혼합 구조 자동 파싱
═══════════════════════════════════════════ */
function loadLinksFromJS() {
  setStatus("loading", "links.js 로딩 중...");
  try {
    if (typeof LINKS_DATA === "undefined") throw new Error("LINKS_DATA 없음");

    const data = LINKS_DATA;
    links = [];

    /* 카테고리 배열 형태 */
    if (Array.isArray(data) && data.length && data[0].category !== undefined) {
      data.forEach(cat => {
        const catName = cat.category || "기타";
        const catIcon = cat.icon || "📁";
        (cat.links || []).forEach(l => {
          links.push({
            id:          l.id || uid(),
            label:       l.label || l.url,
            url:         l.url,
            category:    catName,
            categoryIcon:catIcon,
            subcategory: l.subcategory || ""
          });
        });
      });
    }
    /* 단순 배열 형태 */
    else {
      const raw = Array.isArray(data) ? data : (data.links || []);
      raw.forEach(l => {
        links.push({
          id:          l.id || uid(),
          label:       l.label || l.url,
          url:         l.url,
          category:    l.category || "",
          categoryIcon:l.categoryIcon || "📁",
          subcategory: l.subcategory || ""
        });
      });
    }

    setStatus("ok", `links.js · ${links.length}개`);
    renderNav(links);
  } catch (err) {
    setStatus("error", "links.js 없음");
    links = [];
    renderNav([]);
    console.warn("[BPA] links.js 로드 실패:", err.message);
  }
}

/* ═══════════════════════════════════════════
   렌더링
═══════════════════════════════════════════ */
function renderNav(list) {
  const nav = document.getElementById("navList");
  nav.innerHTML = "";

  if (!list || !list.length) {
    nav.innerHTML = `
      <div class="nav-empty">
        링크가 없습니다.<br><br>
        <code>links.js</code> 파일에<br>
        <code>LINKS_DATA</code>를 추가하고<br>
        reload 버튼을 눌러주세요.
      </div>`;
    return;
  }

  /* 카테고리가 있는지 확인 */
  const hasCat = list.some(l => l.category);

  if (!hasCat) {
    /* ── 플랫 리스트 ── */
    const sec = document.createElement("div");
    sec.className = "nav-section-title";
    sec.textContent = "./APP";
    nav.appendChild(sec);

    list.forEach(link => {
      nav.appendChild(makeNavItem(link, "flat"));
    });
    return;
  }

  /* ── 카테고리 그룹 렌더 ── */
  const catMap = {};   // catMap[catName] = { icon, subcats: { subcatName: [link] }, direct: [link] }
  list.forEach(link => {
    const c = link.category || "기타";
    if (!catMap[c]) catMap[c] = { icon: link.categoryIcon || "📁", subcats: {}, direct: [] };
    const s = link.subcategory;
    if (s) {
      if (!catMap[c].subcats[s]) catMap[c].subcats[s] = [];
      catMap[c].subcats[s].push(link);
    } else {
      catMap[c].direct.push(link);
    }
  });

  Object.entries(catMap).forEach(([catName, catData]) => {
    const catKey = "cat__" + catName;
    if (catOpen[catKey] === undefined) catOpen[catKey] = true; // 기본 펼침

    const totalCount =
      catData.direct.length +
      Object.values(catData.subcats).reduce((s, arr) => s + arr.length, 0);

    /* 카테고리 헤더 */
    const header = document.createElement("div");
    header.className = "cat-header" + (catOpen[catKey] ? " open" : "");
    header.innerHTML = `
      <span class="cat-icon">${esc(catData.icon)}</span>
      <span class="cat-label">${esc(catName)}</span>
      <span class="cat-count">${totalCount}</span>
      <span class="cat-arrow">▶</span>
    `;

    /* 카테고리 바디 */
    const body = document.createElement("div");
    body.className = "cat-body" + (catOpen[catKey] ? " open" : "");

    header.addEventListener("click", () => {
      catOpen[catKey] = !catOpen[catKey];
      header.classList.toggle("open", catOpen[catKey]);
      body.classList.toggle("open", catOpen[catKey]);
    });

    nav.appendChild(header);
    nav.appendChild(body);

    /* 직속 아이템 */
    catData.direct.forEach(link => {
      body.appendChild(makeNavItem(link, "direct"));
    });

    /* 서브카테고리 */
    Object.entries(catData.subcats).forEach(([subName, subLinks]) => {
      const subKey = catKey + "__" + subName;
      if (subcatOpen[subKey] === undefined) subcatOpen[subKey] = false; // 기본 접힘

      const subHeader = document.createElement("div");
      subHeader.className = "subcat-header" + (subcatOpen[subKey] ? " open" : "");
      subHeader.innerHTML = `
        <span class="subcat-arrow">▶</span>
        <span class="subcat-label">└ ${esc(subName)}</span>
        <span class="subcat-count">${subLinks.length}</span>
      `;

      const subBody = document.createElement("div");
      subBody.className = "subcat-body" + (subcatOpen[subKey] ? " open" : "");

      subHeader.addEventListener("click", () => {
        subcatOpen[subKey] = !subcatOpen[subKey];
        subHeader.classList.toggle("open", subcatOpen[subKey]);
        subBody.classList.toggle("open", subcatOpen[subKey]);
      });

      body.appendChild(subHeader);
      body.appendChild(subBody);

      subLinks.forEach(link => {
        subBody.appendChild(makeNavItem(link, "sub"));
      });
    });
  });
}

function makeNavItem(link, type) {
  const item = document.createElement("div");
  item.className = "nav-item" + (link.id === activeId ? " active" : "");
  item.dataset.id = link.id;
  item.innerHTML = `
    <span class="nav-dot"></span>
    <span class="nav-label" title="${esc(link.url)}">${esc(link.label)}</span>
  `;
  item.addEventListener("click",       () => openLink(link.id));
  item.addEventListener("contextmenu", e  => showCtx(e, link.id));
  return item;
}

/* ═══════════════════════════════════════════
   검색 필터
═══════════════════════════════════════════ */
function filterNav(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    renderNav(links);
    return;
  }
  const filtered = links.filter(l =>
    l.label.toLowerCase().includes(q) ||
    l.url.toLowerCase().includes(q) ||
    (l.category && l.category.toLowerCase().includes(q)) ||
    (l.subcategory && l.subcategory.toLowerCase().includes(q))
  );
  renderNav(filtered);
}

/* ═══════════════════════════════════════════
   홈 / 도움말
═══════════════════════════════════════════ */
function goHome() {
  activeId = null;
  document.getElementById("btnHelp").classList.remove("active");
  renderNav(links);

  document.getElementById("topCat").textContent   = "";
  document.getElementById("topSep").textContent   = "";
  document.getElementById("topTitle").textContent = "BPA";
  document.getElementById("topUrl").textContent   = "";

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = "#";
  btnTab.classList.remove("visible");

  const iframe = document.getElementById("viewer");
  iframe.style.display = "none";
  iframe.src = "about:blank";

  document.getElementById("emptyState").style.display = "";
}

function goHelp() {
  activeId = null;
  renderNav(links);

  document.getElementById("btnHelp").classList.add("active");
  document.getElementById("topCat").textContent   = "";
  document.getElementById("topSep").textContent   = "";
  document.getElementById("topTitle").textContent = "도움말";
  document.getElementById("topUrl").textContent   = "./readme.html";

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = "./readme.html";
  btnTab.classList.add("visible");

  document.getElementById("emptyState").style.display = "none";
  const iframe = document.getElementById("viewer");
  iframe.style.display = "block";
  iframe.src = "./readme.html";
}

/* ═══════════════════════════════════════════
   링크 열기
═══════════════════════════════════════════ */
function openLink(id) {
  const link = links.find(l => l.id === id);
  if (!link) return;
  activeId = id;
  document.getElementById("btnHelp").classList.remove("active");

  /* 활성 아이템 스타일 업데이트 */
  document.querySelectorAll(".nav-item").forEach(el => {
    const isActive = el.dataset.id === id;
    el.classList.toggle("active", isActive);
  });

  /* topbar 업데이트 */
  const catEl = document.getElementById("topCat");
  const sepEl = document.getElementById("topSep");
  if (link.category) {
    catEl.textContent = link.category + (link.subcategory ? " / " + link.subcategory : "");
    sepEl.textContent = "›";
  } else {
    catEl.textContent = "";
    sepEl.textContent = "";
  }
  document.getElementById("topTitle").textContent = link.label;
  document.getElementById("topUrl").textContent   = link.url;

  const btnTab = document.getElementById("btnNewTab");
  btnTab.href = link.url;
  btnTab.classList.add("visible");

  document.getElementById("emptyState").style.display = "none";
  const iframe = document.getElementById("viewer");
  iframe.style.display = "block";
  iframe.src = link.url;
}

/* ═══════════════════════════════════════════
   컨텍스트 메뉴
═══════════════════════════════════════════ */
function showCtx(e, id) {
  e.preventDefault();
  ctxId = id;
  const menu = document.getElementById("ctxMenu");
  menu.style.left = e.clientX + "px";
  menu.style.top  = e.clientY + "px";
  menu.classList.add("open");
}
function closeCtx() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxId = null;
}
function ctxNewTab() {
  const link = links.find(l => l.id === ctxId);
  if (link) window.open(link.url, "_blank");
  closeCtx();
}

/* ═══════════════════════════════════════════
   전역 이벤트
═══════════════════════════════════════════ */
document.addEventListener("click", e => {
  if (!document.getElementById("ctxMenu").contains(e.target)) closeCtx();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeCtx();
});

/* ═══════════════════════════════════════════
   초기화
═══════════════════════════════════════════ */
loadLinksFromJS();
</script>
</body>
</html>
