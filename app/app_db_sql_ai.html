<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Tuning Report</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 52px 16px 80px;
}

/* ── 로딩 오버레이 ── */
#py-loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.4s;
}
#py-loading.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--accent); margin-bottom: 28px; }
.loading-bar-wrap { width: 240px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.loading-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; animation: loadProg 2.2s ease forwards; }
@keyframes loadProg { to { width: 92%; } }

/* ── 헤더 ── */
.header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
.header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 1.75rem; font-weight: 600; color: var(--accent); }
.header .sub { color: var(--muted); font-size: 0.88rem; font-weight: 300; margin-top: 7px; }

/* ── 카드 공통 ── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 26px 28px; width: 100%; max-width: 860px; margin-bottom: 18px;
  animation: fadeUp 0.6s ease both;
}
.card-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted);
  letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 16px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 입력 폼 ── */
input[type="text"], textarea {
  width: 100%; background: #fafafa; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem;
  outline: none; transition: border-color 0.2s;
}
input[type="text"]:focus, textarea:focus { border-color: var(--accent); background: #fff; }
textarea { min-height: 120px; resize: vertical; line-height: 1.6; white-space: pre; overflow-x: auto; }

.hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

/* ── 실행 버튼 ── */
.btn-main {
  width: 100%; max-width: 860px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; padding: 16px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 20px; animation: fadeUp 0.6s 0.2s ease both;
}
.btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,92,58,0.2); }
.btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── 결과 출력 ── */
.results-card {
  display: none; width: 100%; max-width: 860px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  animation: fadeUp 0.4s ease both; margin-bottom: 40px;
}
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px; border-bottom: 1px solid var(--border);
}
.output-content {
  padding: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; 
  line-height: 1.6; color: var(--text);
  white-space: pre-wrap; overflow-x: auto; word-break: break-all;
  background-color: #faf7f3;
}

.btn-copy {
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
  color: var(--accent); cursor: pointer;
}

/* ── 에러 카드 ── */
.error-card {
  display: none; width: 100%; max-width: 860px;
  background: #fff5f5; border: 1px solid #feb2b2; border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 40px; animation: fadeUp 0.4s ease both;
}
.error-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--notfound);
  letter-spacing: 2px; font-weight: 700; margin-bottom: 10px;
}
.error-msg {
  font-size: 0.85rem; color: #742a2a; line-height: 1.5; white-space: pre-wrap;
}

/* AI 로딩 애니메이션 */
.ai-loading { display: none; text-align: center; padding: 20px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }
.dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
@keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
</style>
</head>
<body>

<div id="py-loading">
  <div class="loading-logo"># SQL TUNING EXPERT #</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div class="header">
  <h1># SQL : TUNER #</h1>
  <div class="sub">SQL과 실행 계획을 분석하여 최적의 튜닝 가이드를 제공합니다</div>
  <div class="sub">v20260323 &nbsp;·&nbsp; by jwcho &nbsp;·&nbsp; AI Expert</div>
</div>

<div class="card">
  <div class="card-title">01. INPUT API Key</div>
  <input type="text" id="apiKey" placeholder="Google Gemini API Key를 입력하세요">
  <div class="hint">발급처: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">Google AI Studio (무료)</a></div>
</div>

<div class="card">
  <div class="card-title">02. TUNING DIRECTION (분석 지시사항)</div>
  <textarea id="promptInput" style="min-height: 80px;">
1. 성능 저하를 유발하는 병목 지점을 상세히 분석
2. 필요한 인덱스(Index) 생성 제안이 있다면 컬럼 구성과 함께 명시
3. 가장 마지막 부분에 성능 향상을 위한 SQL 리라이팅(Rewrite) 전체 쿼리를 작성
</textarea>
</div>

<div class="card">
  <div class="card-title">03. SQL QUERY</div>
  <textarea id="sqlInput" placeholder="튜닝할 SQL 쿼리를 입력하세요."></textarea>
</div>

<div class="card">
  <div class="card-title">04. EXECUTION PLAN</div>
  <textarea id="planInput" placeholder="Explain Plan 등 실행 계획을 입력하세요 (선택사항)."></textarea>
  <div class="hint">실행 계획이 있으면 더 정확한 분석이 가능합니다.</div>
</div>

<button class="btn-main" id="runBtn">분석 및 튜닝 시작</button>

<div class="ai-loading" id="aiStatus">AI가 실행 계획을 분석 중입니다<span class="dots"></span></div>

<div class="error-card" id="errorCard">
  <div class="error-title">! ERROR OCCURRED</div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="results-card" id="resultCard">
  <div class="results-header">
    <span class="card-title" style="margin-bottom:0">TUNING REPORT</span>
    <button class="btn-copy" id="copyBtn">복사하기</button>
  </div>
  <pre class="output-content" id="outputArea"></pre>
</div>

<script>
  // 로딩 오버레이 즉시 제거 (PyScript 불필요)
  window.addEventListener('DOMContentLoaded', () => {
    const loading = document.getElementById('py-loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 450);
  });

  document.getElementById('runBtn').addEventListener('click', tuneSQL);
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('outputArea').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerText = '복사 완료!';
      setTimeout(() => { btn.innerText = '복사하기'; }, 2000);
    });
  });

  async function tuneSQL() {
    const apiKey       = document.getElementById('apiKey').value.trim();
    const tuningPrompt = document.getElementById('promptInput').value.trim();
    const sqlQuery     = document.getElementById('sqlInput').value.trim();
    const execPlan     = document.getElementById('planInput').value.trim();

    const runBtn       = document.getElementById('runBtn');
    const status       = document.getElementById('aiStatus');
    const resultCard   = document.getElementById('resultCard');
    const errorCard    = document.getElementById('errorCard');
    const errorMsgArea = document.getElementById('errorMsg');
    const outputArea   = document.getElementById('outputArea');

    resultCard.style.display = 'none';
    errorCard.style.display  = 'none';

    if (!apiKey) {
      errorMsgArea.textContent = 'API Key가 입력되지 않았습니다.';
      errorCard.style.display = 'block';
      return;
    }
    if (!sqlQuery) {
      errorMsgArea.textContent = 'SQL 쿼리를 입력해주세요.';
      errorCard.style.display = 'block';
      return;
    }

    runBtn.disabled = true;
    status.style.display = 'block';

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    const fullPrompt = [
      'Role: Professional Database Administrator and SQL Tuning Expert.',
      'Task: Analyze the SQL and execution plan to provide a detailed tuning report in Korean.\n',
      '--- User Instructions ---',
      tuningPrompt,
      '',
      '--- Input Data ---',
      `[SQL Query]\n${sqlQuery}\n`,
      `[Execution Plan]\n${execPlan || 'Not provided.'}\n`,
      '--- Output Guide ---',
      '1. Problem Summary\n2. Performance Analysis\n3. Tuned SQL\n4. Recommendation (Index, etc.)',
      'Provide professional advice. Keep the response clean.'
    ].join('\n');

    const payload = { contents: [{ parts: [{ text: fullPrompt }] }] };

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (response.ok) {
        let tunedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (tunedText !== undefined) {
          tunedText = tunedText.replace(/```sql/g, '').replace(/```/g, '').trim();
          outputArea.textContent = tunedText;
          resultCard.style.display = 'block';
          resultCard.scrollIntoView({ behavior: 'smooth' });
        } else {
          errorMsgArea.textContent = 'AI가 응답을 생성했으나 해석할 수 없습니다.';
          errorCard.style.display = 'block';
        }
      } else {
        const msg = data?.error?.message ?? 'Unknown Error';
        errorMsgArea.textContent = `API 오류: ${msg}`;
        errorCard.style.display = 'block';
      }
    } catch (e) {
      errorMsgArea.textContent = `연결 문제 발생: ${e.message}`;
      errorCard.style.display = 'block';
    } finally {
      runBtn.disabled = false;
      status.style.display = 'none';
    }
  }
</script>

</body>
</html>
