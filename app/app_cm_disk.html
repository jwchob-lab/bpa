<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA : DISK</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root {
  --bg:      #f2ece3;
  --surface: #ffffff;
  --border:  #e0d8cc;
  --accent:  #7c5c3a;
  --text:    #2e2318;
  --muted:   #a0907e;
  --found:   #3a7c5c;
  --danger:  #c0392b;
  --warn:    #e67e22;
  --radius:  12px;
  --font:    'Pretendard', 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 16px 80px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 헤더 ── */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeUp 0.6s ease both;
}
.header h1 {
  font-family: var(--font);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--accent);
}
.header .sub {
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 300;
  margin-top: 7px;
}
.header .ver {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 10px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px 28px;
  width: 100%;
  max-width: 860px;
  margin-bottom: 18px;
  animation: fadeUp 0.6s ease both;
}
.card:nth-child(2) { animation-delay: 0.08s; }
.card:nth-child(3) { animation-delay: 0.16s; }

.card-title {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── 설정 행 ── */
.settings-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 140px;
}
.field label {
  font-family: var(--font);
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.field input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--font);
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }

/* ── 드롭존 ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  margin-bottom: 14px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(124,92,58,0.04);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-text { font-size: 0.88rem; color: var(--muted); }
.drop-text span { color: var(--accent); font-weight: 700; }
.drop-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

/* ── textarea ── */
textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  resize: vertical;
  min-height: 160px;
  line-height: 1.7;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

.hint {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 8px;
}

/* ── 실행 버튼 ── */
.btn-run {
  width: 100%;
  max-width: 860px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
  letter-spacing: 1px;
  margin-bottom: 20px;
  animation: fadeUp 0.6s 0.24s ease both;
}
.btn-run:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
.btn-run:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── 결과 카드 ── */
.result-card {
  display: none;
  width: 100%;
  max-width: 860px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
  margin-bottom: 18px;
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
}
.result-header-title {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* ── 예측 요약 배지 ── */
.summary-badges {
  display: flex;
  gap: 10px;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.badge {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  flex: 1;
  min-width: 150px;
}
.badge-label {
  font-family: var(--font);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.badge-value {
  font-family: var(--font);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
}
.badge.danger  { border-color: rgba(192,57,43,0.4);  background: rgba(192,57,43,0.05); }
.badge.warn    { border-color: rgba(230,126,34,0.4);  background: rgba(230,126,34,0.05); }
.badge.ok      { border-color: rgba(58,124,92,0.4);   background: rgba(58,124,92,0.05); }
.badge.danger .badge-value { color: var(--danger); }
.badge.warn    .badge-value { color: var(--warn); }
.badge.ok      .badge-value { color: var(--found); }

/* ── 범례 안내 ── */
.legend-guide {
  display: flex;
  gap: 20px;
  padding: 10px 22px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: rgba(242,236,227,0.5);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font);
  font-size: 0.75rem;
}
.legend-line {
  width: 28px;
  height: 3px;
  border-radius: 2px;
}
.legend-line.warn-line {
  background: rgba(230,126,34,0.9);
  border-top: 2px dashed rgba(230,126,34,0.9);
  height: 0;
}
.legend-line.danger-line {
  background: rgba(192,57,43,0.9);
  border-top: 2px dashed rgba(192,57,43,0.9);
  height: 0;
}
.legend-label-warn  { color: var(--warn); font-weight: 600; }
.legend-label-danger { color: var(--danger); font-weight: 600; }

/* ── 차트 영역 ── */
.chart-wrap {
  padding: 20px 22px;
}
canvas#myChart {
  width: 100% !important;
}

/* ── 다운로드 버튼 ── */
.btn-row {
  display: flex;
  gap: 8px;
  padding: 0 22px 18px;
  justify-content: flex-end;
}
.btn-dl {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-family: var(--font);
  font-size: 0.78rem;
  color: var(--accent);
  cursor: pointer;
  transition: border-color 0.2s;
}
.btn-dl:hover { border-color: var(--accent); }
.btn-dl.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-dl.primary:hover { opacity: 0.85; }

/* ── 에러 ── */
.error-msg {
  display: none;
  background: rgba(192,57,43,0.08);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: var(--font);
  font-size: 0.8rem;
  color: var(--danger);
  margin-top: 12px;
  width: 100%;
  max-width: 860px;
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1># BPA : DISK #</h1>
  <div class="sub">데이터 증가량을 입력하면 디스크 부족 시점을 자동으로 예측합니다</div>
  <div class="ver">v20260323 &nbsp;·&nbsp; by jwcho &nbsp;·&nbsp; Chart.js</div>
</div>

<!-- 01. 설정 -->
<div class="card">
  <div class="card-title">01. 디스크 설정</div>
  <div class="settings-row">
    <div class="field">
      <label>전체 디스크 용량 (GB)</label>
      <input type="number" id="totalDisk" placeholder="ex) 1000" min="1">
    </div>
    <div class="field">
      <label>임계치 (%)</label>
      <input type="number" id="threshold" placeholder="ex) 90" min="1" max="100" value="90">
    </div>
    <div class="field">
      <label>예측 단위</label>
      <input type="text" id="unitLabel" placeholder="ex) 월, 일, 주" value="월">
    </div>
  </div>
</div>

<!-- 02. 데이터 입력 -->
<div class="card">
  <div class="card-title">02. 증가량 데이터 입력</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".csv,.txt">
    <div class="drop-text"><span>클릭</span> 또는 CSV 파일을 드래그하세요</div>
    <div class="drop-sub">CSV · TXT 지원 &nbsp;·&nbsp; 헤더 자동 감지</div>
  </div>
  <textarea id="dataInput" placeholder="날짜(또는 기간), 사용량(GB) 형식으로 입력하세요&#10;&#10;예시)&#10;2024-01, 120&#10;2024-02, 135&#10;2024-03, 158&#10;2024-04, 172&#10;2024-05, 195&#10;&#10;※ 쉼표 또는 탭으로 구분"></textarea>
  <div class="hint">첫 번째 열: 날짜/기간 &nbsp;·&nbsp; 두 번째 열: 누적 사용량(GB) &nbsp;·&nbsp; 헤더 행은 자동으로 건너뜁니다</div>
</div>

<!-- 실행 버튼 -->
<button class="btn-run" id="runBtn" onclick="runAnalysis()">예측 분석 실행</button>

<!-- 에러 -->
<div class="error-msg" id="errorMsg"></div>

<!-- 결과 -->
<div class="result-card" id="resultCard">
  <div class="result-header">
    <span class="result-header-title">예측 결과</span>
    <span id="resultMeta" style="font-family:var(--font);font-size:0.75rem;color:var(--muted);"></span>
  </div>

  <div class="summary-badges" id="summaryBadges"></div>

  <!-- 그래프 범례 안내 -->
  <div class="legend-guide">
    <div class="legend-item">
      <div class="legend-line warn-line"></div>
      <span class="legend-label-warn">증설 필수 (90%)</span>
    </div>
    <div class="legend-item">
      <div class="legend-line danger-line"></div>
      <span class="legend-label-danger">디스크 부족 (100%)</span>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="myChart"></canvas>
  </div>

  <div class="btn-row">
    <button class="btn-dl" onclick="downloadCSV()">↓ CSV</button>
    <button class="btn-dl primary" onclick="downloadPNG()">↓ PNG 저장</button>
  </div>
</div>

<script>
/* ====================================
   전역
==================================== */
let chartInstance = null;
let lastParsed    = null;

/* ── 드래그앤드롭 ── */
const dz = document.getElementById("dropZone");
dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("dragover"); });
dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
document.getElementById("fileInput").addEventListener("change", e => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => { document.getElementById("dataInput").value = e.target.result.trim(); };
  reader.readAsText(file, "utf-8");
}

/* ====================================
   데이터 파싱
==================================== */
function parseData(raw) {
  const lines = raw.trim().split(/\r?\n/).filter(l => l.trim());
  const labels = [], values = [];

  for (const line of lines) {
    const parts = line.split(/[,\t]+/).map(p => p.trim().replace(/^["']|["']$/g, ""));
    if (parts.length < 2) continue;
    const val = parseFloat(parts[1].replace(/[^\d.-]/g, ""));
    if (isNaN(val)) continue;
    labels.push(parts[0]);
    values.push(val);
  }
  if (values.length < 2) throw new Error("데이터가 2행 이상 필요합니다.");
  return { labels, values };
}

/* ====================================
   선형 회귀
==================================== */
function linearRegression(values) {
  const n = values.length;
  const xs = values.map((_, i) => i);
  const sumX  = xs.reduce((a, b) => a + b, 0);
  const sumY  = values.reduce((a, b) => a + b, 0);
  const sumXY = xs.reduce((a, x, i) => a + x * values[i], 0);
  const sumX2 = xs.reduce((a, x) => a + x * x, 0);
  const slope     = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX ** 2);
  const intercept = (sumY - slope * sumX) / n;
  return { slope, intercept };
}

/* ====================================
   날짜 파싱 & 예측 레이블 생성 헬퍼
==================================== */

/**
 * 레이블에서 연/월을 추출합니다.
 * 파싱 실패 시 현재 날짜를 기준으로 반환하여 무조건 날짜 형식이 유지되도록 함.
 */
function parseYearMonth(label) {
  // YYYY-MM / YYYY/MM / YYYY.MM
  let m = label.match(/(\d{4})[-\/\.](\d{1,2})/);
  if (m) return { year: +m[1], month: +m[2] };
  // YYYY년M월
  m = label.match(/(\d{4})년\s*(\d{1,2})월/);
  if (m) return { year: +m[1], month: +m[2] };
  // 6자리 숫자 YYYYMM
  m = label.match(/^(\d{4})(\d{2})$/);
  if (m) return { year: +m[1], month: +m[2] };
  
  // 파싱 실패 시 오늘 날짜 반환 (안전장치)
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() + 1 };
}

/**
 * baseYear/baseMonth 에서 offsetMonths 만큼 더한 "YYYY년MM월" 문자열 반환.
 */
function addMonthLabel(baseYear, baseMonth, offsetMonths) {
  const total = (baseYear * 12 + (baseMonth - 1)) + offsetMonths;
  const y = Math.floor(total / 12);
  const mo = (total % 12) + 1;
  return `${y}년 ${String(mo).padStart(2, "0")}월`;
}

/* ====================================
   예측 실행
==================================== */
function runAnalysis() {
  hideError();

  const raw       = document.getElementById("dataInput").value;
  const totalDisk = parseFloat(document.getElementById("totalDisk").value);
  const threshold = parseFloat(document.getElementById("threshold").value) || 90;
  const unitLabel = document.getElementById("unitLabel").value.trim() || "개월";

  const warnGB    = totalDisk ? totalDisk * (threshold / 100) : null;
  const fullGB    = totalDisk ? totalDisk : null;

  try {
    const { labels, values } = parseData(raw);
    const { slope, intercept } = linearRegression(values);

    // 1. 첫 번째 데이터의 날짜를 기준으로 삼아 순차적인 레이블 생성
    // (입력 데이터의 형식이 들쭉날쭉해도 차트에는 정돈된 날짜가 나오도록 함)
    const firstDateObj = parseYearMonth(labels[0]);

    // 실측 데이터 레이블을 "YYYY년 MM월"로 통일
    const normalizedLabels = labels.map((_, idx) => {
      return addMonthLabel(firstDateObj.year, firstDateObj.month, idx);
    });

    const predLabels = [...normalizedLabels];
    const predValues = [];
    let exhaustIdxWarn  = null;
    let exhaustLabelWarn = null;
    let exhaustIdxFull  = null;
    let exhaustLabelFull = null;

    // 마지막 실측 데이터의 위치
    const lastDataIdx = values.length - 1;

    const maxPredict = 60; // 최대 5년까지 예측
    for (let i = values.length; i < values.length + maxPredict; i++) {
      const predicted = +(intercept + slope * i).toFixed(2);
      predValues.push(predicted);

      // 무조건 "YYYY년 MM월" 형식으로 생성
      const predLabel = addMonthLabel(firstDateObj.year, firstDateObj.month, i);
      predLabels.push(predLabel);

      if (warnGB !== null && exhaustIdxWarn === null && predicted >= warnGB) {
        exhaustIdxWarn   = i;
        exhaustLabelWarn = predLabel;
      }
      if (fullGB !== null && exhaustIdxFull === null && predicted >= fullGB) {
        exhaustIdxFull   = i;
        exhaustLabelFull = predLabel;
      }
      
      // 예측 중단 조건: 풀 용량 도달 후 3개월 더 보여주거나, 너무 멀면 중단
      if (exhaustIdxFull !== null && i > exhaustIdxFull + 3) break;
      if (exhaustIdxFull === null && exhaustIdxWarn !== null && i > exhaustIdxWarn + 12) break;
    }

    lastParsed = {
      labels: normalizedLabels, values,
      predLabels, predValues,
      slope, intercept,
      totalDisk, threshold,
      warnGB, fullGB,
      exhaustIdxWarn, exhaustLabelWarn,
      exhaustIdxFull, exhaustLabelFull,
      unitLabel,
    };

    renderChart(lastParsed);
    renderSummary(lastParsed);

    document.getElementById("resultMeta").textContent =
      `데이터 ${values.length}개  ·  월 증가 ${slope >= 0 ? "+" : ""}${slope.toFixed(1)} GB`;
    document.getElementById("resultCard").style.display = "block";
    document.getElementById("resultCard").scrollIntoView({ behavior: "smooth", block: "start" });

  } catch (err) {
    showError(err.message);
  }
}

/* ====================================
   요약 배지
==================================== */
function renderSummary(d) {
  const container = document.getElementById("summaryBadges");
  container.innerHTML = "";

  const avgGrowth = d.slope.toFixed(1);
  const lastVal   = d.values[d.values.length - 1].toFixed(1);
  const usePct    = d.totalDisk ? ((d.values[d.values.length - 1] / d.totalDisk) * 100).toFixed(1) : null;

  const badges = [
    {
      label: "현재 사용량",
      value: `${lastVal} GB` + (usePct ? ` (${usePct}%)` : ""),
      cls: usePct && parseFloat(usePct) >= d.threshold ? "danger" : usePct && parseFloat(usePct) >= d.threshold * 0.8 ? "warn" : "ok",
    },
    {
      label: `월 평균 증가량`,
      value: `${d.slope >= 0 ? "+" : ""}${avgGrowth} GB`,
      cls: d.slope > 0 ? "warn" : "ok",
    },
  ];

  if (d.warnGB !== null) {
    badges.push({
      label: `증설 필수 (${d.threshold}%)`,
      value: d.exhaustLabelWarn ? d.exhaustLabelWarn : "예측 범위 초과",
      cls: d.exhaustLabelWarn ? "warn" : "ok",
    });
  }

  if (d.fullGB !== null) {
    badges.push({
      label: `디스크 부족 (100%)`,
      value: d.exhaustLabelFull ? d.exhaustLabelFull : "예측 범위 초과",
      cls: d.exhaustLabelFull ? "danger" : "ok",
    });
  }

  badges.forEach(b => {
    const el = document.createElement("div");
    el.className = `badge ${b.cls}`;
    el.innerHTML = `<span class="badge-label">${b.label}</span><span class="badge-value">${b.value}</span>`;
    container.appendChild(el);
  });
}

/* ====================================
   차트 렌더링
==================================== */
function renderChart(d) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const allLabels = d.predLabels;
  const n         = d.values.length;

  const actualData  = allLabels.map((_, i) => i < n ? d.values[i] : null);
  const trendData   = allLabels.map((_, i) => +(d.intercept + d.slope * i).toFixed(2));
  const predictData = allLabels.map((_, i) => i >= n - 1 ? +(d.intercept + d.slope * i).toFixed(2) : null);

  const warnLineData = d.warnGB !== null ? allLabels.map(() => d.warnGB) : null;
  const fullLineData = d.fullGB !== null ? allLabels.map(() => d.fullGB) : null;

  const ctx = document.getElementById("myChart").getContext("2d");

  const datasets = [
    {
      label: "실제 사용량 (GB)",
      data: actualData,
      type: "bar",
      backgroundColor: "rgba(124,92,58,0.55)",
      borderColor:     "rgba(124,92,58,0.9)",
      borderWidth: 1,
      borderRadius: 4,
      order: 4,
    },
    {
      label: "예측 사용량 (GB)",
      data: predictData,
      type: "bar",
      backgroundColor: "rgba(124,92,58,0.18)",
      borderColor:     "rgba(124,92,58,0.45)",
      borderWidth: 1,
      borderRadius: 4,
      order: 3,
    },
    {
      label: "추세선",
      data: trendData,
      type: "line",
      borderColor:     "rgba(58,124,92,0.85)",
      backgroundColor: "transparent",
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.3,
      order: 2,
    },
  ];

  if (warnLineData) {
    datasets.push({
      label: `증설 필수 (${d.threshold}% / ${d.warnGB.toFixed(0)} GB)`,
      data: warnLineData,
      type: "line",
      borderColor:     "rgba(230,126,34,0.95)",
      backgroundColor: "transparent",
      borderWidth: 2.5,
      borderDash: [8, 5],
      pointRadius: 0,
      order: 1,
    });
  }

  if (fullLineData) {
    datasets.push({
      label: `디스크 부족 (100% / ${d.fullGB.toFixed(0)} GB)`,
      data: fullLineData,
      type: "line",
      borderColor:     "rgba(192,57,43,0.95)",
      backgroundColor: "transparent",
      borderWidth: 2.5,
      borderDash: [6, 4],
      pointRadius: 0,
      order: 0,
    });
  }

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: { labels: allLabels, datasets },
    options: {
      responsive: true,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          labels: {
            font: { family: "'Pretendard', sans-serif", size: 13, weight: "500" },
            color: "#2e2318",
            padding: 16,
            boxWidth: 14,
          },
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.raw === null) return null;
              return ` ${ctx.dataset.label}: ${ctx.raw.toFixed(1)} GB`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: {
            font: { family: "'Pretendard', sans-serif", size: 11 },
            color: "#6b5a47",
            maxRotation: 45,
          },
          grid: { display: false },
        },
        y: {
          ticks: {
            font: { family: "'Pretendard', sans-serif", size: 12 },
            color: "#6b5a47",
            callback: v => v + " GB",
          },
          grid: { display: false },
          beginAtZero: false,
        },
      },
    },
    plugins: [{
      id: "customZones",
      beforeDraw(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return;
        const xScale = scales.x;
        const yScale = scales.y;
        const totalLen = allLabels.length;

        if (n < totalLen) {
          const x0 = xScale.getPixelForValue(n - 1);
          const x1 = xScale.getPixelForValue(totalLen - 1) + (xScale.getPixelForValue(1) - xScale.getPixelForValue(0)) * 0.5;
          ctx.save();
          ctx.fillStyle = "rgba(124,92,58,0.04)";
          ctx.fillRect(x0, chartArea.top, x1 - x0, chartArea.bottom - chartArea.top);
          ctx.restore();
        }

        if (d.exhaustIdxWarn !== null) {
          const xi = xScale.getPixelForValue(d.exhaustIdxWarn);
          ctx.save();
          ctx.strokeStyle = "#e67e22";
          ctx.lineWidth   = 1.5;
          ctx.setLineDash([5, 4]);
          ctx.beginPath(); ctx.moveTo(xi, chartArea.top); ctx.lineTo(xi, chartArea.bottom); ctx.stroke();
          ctx.setLineDash([]);

          const label1 = "증설 필수";
          const label2 = d.exhaustLabelWarn;
          drawBubble(ctx, xi, chartArea.top + 6, label1, label2, "#e67e22", chartArea);
          ctx.restore();
        }

        if (d.exhaustIdxFull !== null) {
          const xi = xScale.getPixelForValue(d.exhaustIdxFull);
          ctx.save();
          ctx.strokeStyle = "#c0392b";
          ctx.lineWidth   = 1.5;
          ctx.setLineDash([5, 4]);
          ctx.beginPath(); ctx.moveTo(xi, chartArea.top); ctx.lineTo(xi, chartArea.bottom); ctx.stroke();
          ctx.setLineDash([]);

          const label1 = "디스크 부족";
          const label2 = d.exhaustLabelFull;
          
          // warn과 겹치면 아래에 그리기
          let yOffset = chartArea.top + 6;
          if (d.exhaustIdxWarn !== null && Math.abs(d.exhaustIdxFull - d.exhaustIdxWarn) < 3) {
             yOffset += 50;
          }
          drawBubble(ctx, xi, yOffset, label1, label2, "#c0392b", chartArea);
          ctx.restore();
        }
      },
    }],
  });
}

function drawBubble(ctx, x, y, l1, l2, color, area) {
  ctx.font = "bold 11px 'Pretendard'";
  const tw = Math.max(ctx.measureText(l1).width, ctx.measureText(l2).width) + 16;
  const th = 34;
  let bx = x - tw/2;
  bx = Math.max(area.left+2, Math.min(bx, area.right-tw-2));

  ctx.fillStyle = "#1a1a1a";
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  roundRect(ctx, bx, y, tw, th, 6);
  ctx.fill(); ctx.stroke();

  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.fillText(l1, bx + tw/2, y + 14);
  ctx.fillStyle = color;
  ctx.fillText(l2, bx + tw/2, y + 28);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function downloadPNG() {
  if (!chartInstance) return;
  const canvas = document.getElementById("myChart");
  const offscreen = document.createElement("canvas");
  offscreen.width  = canvas.width;
  offscreen.height = canvas.height;
  const octx = offscreen.getContext("2d");
  octx.fillStyle = "#ffffff";
  octx.fillRect(0, 0, offscreen.width, offscreen.height);
  octx.drawImage(canvas, 0, 0);
  const a = document.createElement("a");
  a.href     = offscreen.toDataURL("image/png");
  a.download = "disk_prediction.png";
  a.click();
}

function downloadCSV() {
  if (!lastParsed) return;
  const d = lastParsed;
  const rows = [["기간", "실제사용량(GB)", "추세선(GB)", "구분"]];
  const n = d.values.length;
  d.predLabels.forEach((lbl, i) => {
    const actual  = i < n ? d.values[i].toFixed(1) : "";
    const trend   = (d.intercept + d.slope * i).toFixed(1);
    const type    = i < n ? "실측" : "예측";
    rows.push([lbl, actual, trend, type]);
  });
  const csv  = rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "disk_prediction.csv";
  a.click(); URL.revokeObjectURL(url);
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = "?? " + msg;
  el.style.display = "block";
}
function hideError() {
  document.getElementById("errorMsg").style.display = "none";
}
