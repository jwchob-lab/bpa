<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA : Oracle Grant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<!-- 공통 디자인 토큰 (컬러 변수) — 레이아웃/배치는 아래 style에서 원본 그대로 유지 -->
<link rel="stylesheet" href="../theme.css">

<style>
/* :root 변수는 theme.css에서 관리 */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 16px 80px;
}

/* ── 헤더 ── */
.header {
  text-align: center; margin-bottom: 40px;
  animation: fadeUp 0.6s ease both;
}
.header h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1.75rem; font-weight: 600; color: var(--accent);
}
.header .sub { color: var(--muted); font-size: 0.88rem; font-weight: 300; margin-top: 7px; }
.header .ver {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; margin-top: 10px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px 28px;
  width: 100%; max-width: 860px;
  margin-bottom: 18px;
  animation: fadeUp 0.6s ease both;
}
.card:nth-child(2) { animation-delay: 0.08s; }
.card:nth-child(3) { animation-delay: 0.16s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem; color: var(--muted);
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-bottom: 16px;
}

/* ── 드롭존 ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 10px; padding: 26px;
  text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(124,92,58,0.04);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-text { font-size: 0.92rem; color: var(--muted); }
.drop-text span { color: var(--accent); font-weight: 700; }
.drop-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

.file-loaded {
  display: none; margin-top: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.8rem; color: var(--found);
  animation: fadeUp 0.25s ease both;
}

/* ── textarea ── */
textarea {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; color: var(--text);
  font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem;
  outline: none; resize: vertical; min-height: 120px;
  line-height: 1.7; transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

/* ── 태그 ── */
.kw-tags {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
}
.kw-tag {
  background: rgba(124,92,58,0.10);
  border: 1px solid var(--accent);
  color: var(--accent); border-radius: 20px;
  padding: 3px 11px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.77rem;
  animation: tagIn 0.15s ease both;
}
@keyframes tagIn {
  from { opacity: 0; transform: scale(0.82); }
  to   { opacity: 1; transform: scale(1); }
}

.hint { font-size: 0.77rem; color: var(--muted); margin-top: 10px; }

/* ── 실행 버튼 ── */
.btn-search {
  width: 100%; max-width: 860px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  padding: 14px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px;
  margin-bottom: 20px;
  animation: fadeUp 0.6s 0.24s ease both;
}
.btn-search:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
.btn-search:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── 결과 카드 ── */
.results-card {
  display: none; width: 100%; max-width: 860px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  animation: fadeUp 0.4s ease both;
  margin-bottom: 18px;
}
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px; border-bottom: 1px solid var(--border);
}
.results-header-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase;
}
.results-summary {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--muted);
}
.s-num { color: var(--accent); font-weight: 600; }

/* ── SQL 출력 블록 ── */
.sql-block {
  margin: 0;
  padding: 20px 24px;
}

.sql-block-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}

.sql-pre {
  background: #faf7f3;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.82rem;
  line-height: 1.75;
  color: var(--text);
  white-space: pre;
  overflow-x: auto;
  position: relative;
}

/* SQL 하이라이트 */
.sql-kw   { color: #7c5c3a; font-weight: 600; }
.sql-str  { color: #3a7c5c; }
.sql-com  { color: #a0907e; font-style: italic; }
.sql-fn   { color: #5c3a7c; }

/* ── 복사 버튼 ── */
.btn-copy {
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 12px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent);
  cursor: pointer; transition: border-color 0.2s, color 0.2s;
}
.btn-copy:hover { border-color: var(--accent); }
.btn-copy.copied { color: var(--found); border-color: var(--found); }
</style>
</head>
<body>

<div class="header">
  <h1># BPA : Oracle Grant #</h1>
  <div class="sub">테이블명을 입력하면 권한 확인 및 Oracle Grant SQL을 자동으로 만들어줍니다</div>
  <div class="ver">v20260323 &nbsp;·&nbsp; by jwcho &nbsp;·&nbsp; JavaScript</div>
</div>

<div class="card">
  <div class="card-title">01. 테이블 목록</div>
  <div class="drop-zone" id="kwDropZone">
    <input type="file" id="kwFileInput" multiple>
    <div class="drop-text"><span>클릭</span> 또는 파일을 여기에 드래그하세요</div>
    <div class="drop-sub">텍스트 파일 업로드 시 내용이 자동으로 채워집니다</div>
  </div>
  <div class="file-loaded" id="kwFileLoaded"></div>
  <textarea id="tableInput" style="margin-top:16px;"
    placeholder="ex)&#10;테이블명1&#10;테이블명2&#10;--쉼표 또는 줄바꿈으로 구분"></textarea>
  <div class="kw-tags" id="kwTags"></div>
  <div class="hint">쉼표 또는 줄바꿈으로 구분 &nbsp;·&nbsp; 자동으로 대문자 변환됩니다</div>
</div>

<button class="btn-search" id="generateBtn" disabled>쿼리 생성</button>

<div class="results-card" id="resultsCard">
  <div class="results-header">
    <span class="results-header-title">생성된 쿼리</span>
    <div class="results-summary" id="resultsSummary"></div>
  </div>

  <div class="sql-block">
    <div class="sql-block-label">
      <span>SQL Script</span>
      <button class="btn-copy" id="copyBtnCombined" onclick="copySQL()">복사</button>
    </div>
    <div class="sql-pre" id="sqlOutputCombined"></div>
  </div>
</div>

<script>
// ── 테이블명 파싱 (쉼표/줄바꿈 구분, 대문자 변환, 중복 제거) ───────────────
function parseTables(raw) {
  const seen = new Set();
  const result = [];
  for (const token of raw.split(/[,\n]/)) {
    const t = token.trim().toUpperCase();
    if (t && !seen.has(t)) {
      seen.add(t);
      result.push(t);
    }
  }
  return result;
}

// ── SQL 생성 ──────────────────────────────────────────────────────────────
function buildInList(tables) {
  return tables.map((t, idx) => (idx === 0 ? `'${t}'` : `,'${t}'`)).join('\n');
}

function buildQueryCombined(tables) {
  const inList = buildInList(tables);
  const q1 =
    '--1. 권한 확인 (GRANTABLE 이 YES 일 경우 별도 백업문 생성 필요, ex: TO 유저명 WITH GRANT OPTION)\n' +
    'SELECT * FROM DBA_TAB_PRIVS WHERE TABLE_NAME IN (\n' +
    `${inList}\n` +
    ') ORDER BY GRANTABLE DESC, OWNER, TABLE_NAME\n;';
  const q2 =
    "\n\n--2. 권한 스크립트 생성\n" +
    "SELECT 'GRANT '||PRIVILEGE||' ON '||OWNER||'.'||TABLE_NAME||' TO '||GRANTEE||';' FROM DBA_TAB_PRIVS\n" +
    'WHERE UPPER(TABLE_NAME) IN (\n' +
    `${inList}\n` +
    ')\n' +
    'ORDER BY TABLE_NAME\n;';
  return q1 + q2;
}

// ── SQL 하이라이트 (간단) ─────────────────────────────────────────────────
const KEYWORDS = [
  'SELECT','FROM','WHERE','ORDER','BY','DESC','ASC',
  'IN','AND','OR','ON','UPPER','GRANT','TO'
];

function highlightSQL(sql) {
  let result = '';
  let i = 0;
  const n = sql.length;

  while (i < n) {
    // 주석 --
    if (sql.slice(i, i + 2) === '--') {
      let end = sql.indexOf('\n', i);
      end = end === -1 ? n : end + 1;
      result += `<span class="sql-com">${sql.slice(i, end)}</span>`;
      i = end;
      continue;
    }
    // 문자열 ''
    if (sql[i] === "'") {
      let end = sql.indexOf("'", i + 1);
      end = end === -1 ? n : end + 1;
      result += `<span class="sql-str">${sql.slice(i, end)}</span>`;
      i = end;
      continue;
    }
    // 키워드
    let matched = false;
    for (const kw of KEYWORDS) {
      const kl = kw.length;
      if (sql.slice(i, i + kl).toUpperCase() === kw) {
        const after = sql[i + kl] ?? '';
        if (!after || !/[\w]/.test(after)) {
          result += `<span class="sql-kw">${sql.slice(i, i + kl)}</span>`;
          i += kl;
          matched = true;
          break;
        }
      }
    }
    if (!matched) {
      const c = sql[i];
      const escMap = { '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' };
      result += escMap[c] ?? c;
      i++;
    }
  }
  return result;
}

// ── 버튼 활성화 체크 ─────────────────────────────────────────────────────
function checkReady() {
  const raw = document.getElementById('tableInput').value;
  document.getElementById('generateBtn').disabled = parseTables(raw).length === 0;
}

// ── 태그 미리보기 ─────────────────────────────────────────────────────────
function updateTags(raw) {
  const tables = parseTables(raw);
  document.getElementById('kwTags').innerHTML =
    tables.map(t => `<span class="kw-tag">${t}</span>`).join('');
}

// ── 결과 렌더링 ───────────────────────────────────────────────────────────
function renderResults(tables) {
  const combinedSQL = buildQueryCombined(tables);

  document.getElementById('resultsSummary').innerHTML =
    `테이블 <span class="s-num">${tables.length}</span>개`;

  const target = document.getElementById('sqlOutputCombined');
  target.innerHTML = highlightSQL(combinedSQL);
  target.setAttribute('data-raw', combinedSQL);

  const card = document.getElementById('resultsCard');
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 파일 로드 (인코딩 자동 감지) ─────────────────────────────────────────
async function loadFiles(fileList) {
  const ta = document.getElementById('tableInput');
  const lines = [];
  const loaded = [];

  for (const file of fileList) {
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);

    // BOM 감지: UTF-8 BOM (EF BB BF) → utf-8, UTF-16 LE BOM (FF FE) → utf-16le
    let encoding = 'utf-8';
    if (bytes[0] === 0xFF && bytes[1] === 0xFE) encoding = 'utf-16le';
    else if (bytes[0] === 0xFE && bytes[1] === 0xFF) encoding = 'utf-16be';
    else {
      // EUC-KR 휴리스틱: 0x80 이상 바이트가 있으면 euc-kr 시도
      const hasHighByte = bytes.some(b => b > 0x7F);
      if (hasHighByte) {
        try {
          const decoded = new TextDecoder('euc-kr').decode(bytes);
          // 디코딩 결과에 replacement char(U+FFFD)가 없으면 euc-kr로 판단
          if (!decoded.includes('\uFFFD')) encoding = 'euc-kr';
        } catch (_) {}
      }
    }

    const text = new TextDecoder(encoding).decode(bytes).trim();
    lines.push(text);
    loaded.push(file.name);
  }

  ta.value = lines.join('\n');
  const label = loaded.length === 1 ? loaded[0] : `${loaded.length}개 파일: ${loaded.join(', ')}`;
  const el = document.getElementById('kwFileLoaded');
  el.textContent = `✔ ${label}`;
  el.style.display = 'block';
  updateTags(ta.value);
  checkReady();
}

// ── 복사 ─────────────────────────────────────────────────────────────────
function copySQL() {
  const el  = document.getElementById('sqlOutputCombined');
  const raw = el.getAttribute('data-raw') || el.innerText;
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.getElementById('copyBtnCombined');
    btn.textContent = '✔ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '복사';
      btn.classList.remove('copied');
    }, 1800);
  });
}

// ── 이벤트 바인딩 ─────────────────────────────────────────────────────────
document.getElementById('kwFileInput').addEventListener('change', e => {
  if (e.target.files.length > 0) loadFiles(Array.from(e.target.files));
});

const dropZone = document.getElementById('kwDropZone');
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  if (files.length > 0) loadFiles(files);
});

document.getElementById('tableInput').addEventListener('input', e => {
  updateTags(e.target.value);
  checkReady();
});

document.getElementById('generateBtn').addEventListener('click', () => {
  const raw    = document.getElementById('tableInput').value;
  const tables = parseTables(raw);
  if (!tables.length) return;
  renderResults(tables);
});
</script>

</body>
</html>
