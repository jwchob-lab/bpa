<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA : Report</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 52px 16px 80px;
}

/* ── 로딩 오버레이 ── */
#py-loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.4s;
}
#py-loading.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-family: 'IBM Plex Mono', monospace; font-size: 1.4rem; font-weight: 600; color: var(--accent); margin-bottom: 28px; }
.loading-bar-wrap { width: 240px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
.loading-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 99px; animation: loadProg 2.2s ease forwards; }
@keyframes loadProg { to { width: 92%; } }

/* ── 헤더 ── */
.header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
.header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 1.75rem; font-weight: 600; color: var(--accent); }
.header .sub { color: var(--muted); font-size: 0.88rem; font-weight: 300; margin-top: 7px; }

/* ── 카드 공통 ── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 26px 28px; width: 100%; max-width: 860px; margin-bottom: 18px;
  animation: fadeUp 0.6s ease both;
}
.card-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted);
  letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 16px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 입력 폼 ── */
input[type="text"], textarea {
  width: 100%; background: #fafafa; border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem;
  outline: none; transition: border-color 0.2s;
}
input[type="text"]:focus, textarea:focus { border-color: var(--accent); background: #fff; }
textarea { min-height: 180px; resize: vertical; line-height: 1.6; white-space: pre; overflow-x: auto; }

.hint { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

/* ── 실행 버튼 ── */
.btn-main {
  width: 100%; max-width: 860px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; padding: 16px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 20px; animation: fadeUp 0.6s 0.2s ease both;
}
.btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,92,58,0.2); }
.btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── 결과 출력 ── */
.results-card {
  display: none; width: 100%; max-width: 860px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  animation: fadeUp 0.4s ease both; margin-bottom: 40px;
}
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px; border-bottom: 1px solid var(--border);
}
.output-content {
  padding: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; 
  line-height: 1.6; color: var(--text);
  white-space: pre; overflow-x: auto; word-break: break-all;
  background-color: #faf7f3;
}

.btn-copy {
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
  color: var(--accent); cursor: pointer;
}

/* ── 에러 카드 ── */
.error-card {
  display: none; width: 100%; max-width: 860px;
  background: #fff5f5; border: 1px solid #feb2b2; border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 40px; animation: fadeUp 0.4s ease both;
}
.error-title {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--notfound);
  letter-spacing: 2px; font-weight: 700; margin-bottom: 10px;
}
.error-msg {
  font-size: 0.85rem; color: #742a2a; line-height: 1.5; white-space: pre-wrap;
}

/* AI 로딩 애니메이션 */
.ai-loading { display: none; text-align: center; padding: 20px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }
.dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
@keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
</style>
</head>
<body>

<div id="py-loading">
  <div class="loading-logo"># AI : FORMAT PRESERVER #</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div class="header">
  <h1># BPA : Report #</h1>
  <div class="sub">AI가 지시사항을 받아서 입력한 텍스트를 보정</div>
  <div class="sub">v20260323 &nbsp;·&nbsp; by jwcho &nbsp;·&nbsp; AI</div>
</div>

<div class="card">
  <div class="card-title">01. INPUT API Key</div>
  <input type="text" id="apiKey" placeholder="Google Gemini API Key를 입력하세요">
  <div class="hint">발급처: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">Google AI Studio (무료)</a></div>
</div>

<div class="card">
  <div class="card-title">02. SYSTEM PROMPT (AI 지시사항)</div>
  <textarea id="promptInput" style="min-height: 100px;">
1. 기존 양식은 그대로 유지 (ex: ; - 빈칸 등)
2. 사람 이름 뒤에는 님자를 붙이도록 지정 (ex: 홍길동 -> 홍길동님)
3. 비지니스 보고서 문구 위주로 보정
4. 대분류는 가장 앞에 -를 배치하고 처음 단어에 () 로 감싸줘
5. 중분류는 앞에 공백 한칸 배치하고 · 지정
6. 하분류는 앞에 공백 두칸 배치하고 ; 지정
7. 위 사항을 기반으로 입력받은 텍스트를 상황게 맞게 잘 정리해줘
</textarea>
  <div class="hint">AI에게 줄 추가적인 지시사항을 수정할 수 있습니다.</div>
</div>

<div class="card">
  <div class="card-title">03. INPUT TEXT</div>
  <textarea id="textInput" placeholder="다듬고 싶은 텍스트를 입력하세요."></textarea>
  <div class="hint">원하는 규칙을 추가할수 있습니다.</div>
</div>

<button class="btn-main" id="runBtn">변환 시작</button>

<div class="ai-loading" id="aiStatus">AI 계산중...<span class="dots"></span></div>

<div class="error-card" id="errorCard">
  <div class="error-title">! ERROR OCCURRED</div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<div class="results-card" id="resultCard">
  <div class="results-header">
    <span class="card-title" style="margin-bottom:0">REFINED RESULT</span>
    <button class="btn-copy" id="copyBtn">복사하기</button>
  </div>
  <pre class="output-content" id="outputArea"></pre>
</div>

<script>
  // 로딩 오버레이 즉시 제거 (PyScript 불필요)
  window.addEventListener('DOMContentLoaded', () => {
    const loading = document.getElementById('py-loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 450);
  });

  document.getElementById('runBtn').addEventListener('click', refineText);
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = document.getElementById('outputArea').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.innerText = '복사 완료!';
      setTimeout(() => { btn.innerText = '복사하기'; }, 2000);
    });
  });

  async function refineText() {
    const apiKey    = document.getElementById('apiKey').value.trim();
    const userPrompt = document.getElementById('promptInput').value.trim();
    const inputText  = document.getElementById('textInput').value.trim();

    const runBtn      = document.getElementById('runBtn');
    const status      = document.getElementById('aiStatus');
    const resultCard  = document.getElementById('resultCard');
    const errorCard   = document.getElementById('errorCard');
    const errorMsgArea = document.getElementById('errorMsg');
    const outputArea  = document.getElementById('outputArea');

    resultCard.style.display = 'none';
    errorCard.style.display  = 'none';

    if (!apiKey) {
      errorMsgArea.textContent = 'API Key가 입력되지 않았습니다.';
      errorCard.style.display = 'block';
      return;
    }
    if (!inputText) {
      errorMsgArea.textContent = '내용을 입력해주세요.';
      errorCard.style.display = 'block';
      return;
    }

    runBtn.disabled = true;
    status.style.display = 'block';

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

    const fullPrompt = [
      'Role: Professional Business Editor',
      'Task: Refine the provided text based on the instructions below.\n',
      '--- Instructions ---',
      userPrompt,
      '',
      '--- Mandatory Constraints ---',
      '1. Keep the EXACT same structure, delimiters, and spacing.',
      '2. Do NOT change the layout or position of lines.',
      '3. Output ONLY the refined text. No conversational response, no markdown code blocks.\n',
      `Text to refine:\n${inputText}`
    ].join('\n');

    const payload = { contents: [{ parts: [{ text: fullPrompt }] }] };

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (response.ok) {
        let refinedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (refinedText !== undefined) {
          refinedText = refinedText.replace(/```/g, '').trim();
          outputArea.textContent = refinedText;
          resultCard.style.display = 'block';
          resultCard.scrollIntoView({ behavior: 'smooth' });
        } else {
          errorMsgArea.textContent = 'AI가 응답을 생성했으나 해석할 수 없습니다. (Safety Filter 차단 가능성)';
          errorCard.style.display = 'block';
        }
      } else {
        const msg = data?.error?.message ?? 'Unknown Error';
        errorMsgArea.textContent = `API 오류 발생: ${msg}`;
        errorCard.style.display = 'block';
      }
    } catch (e) {
      errorMsgArea.textContent = `연결 문제 발생: ${e.message}`;
      errorCard.style.display = 'block';
    } finally {
      runBtn.disabled = false;
      status.style.display = 'none';
    }
  }
</script>

</body>
</html>
