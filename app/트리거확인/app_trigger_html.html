<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #f2ece3;
    --surface: #ffffff;
    --border: #e0d8cc;
    --accent: #7c5c3a;
    --text: #2e2318;
    --muted: #a0907e;
    --found: #3a7c5c;
    --notfound: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px;
  }

  .header { text-align: center; margin-bottom: 40px; }
  .header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
  }
  .header p { color: var(--muted); margin-top: 8px; font-size: 0.9rem; font-weight: 300; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 36px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,229,160,0.04);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 2rem; margin-bottom: 10px; }
  .drop-text { font-size: 0.95rem; color: var(--muted); }
  .drop-text span { color: var(--accent); font-weight: 700; }
  .file-name {
    margin-top: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent);
    display: none;
  }

  /* 키워드 textarea */
  .keyword-textarea {
    width: 100%;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
    min-height: 90px;
    line-height: 1.7;
  }
  .keyword-textarea:focus { border-color: var(--accent); }
  .keyword-textarea::placeholder { color: var(--muted); }

  .keyword-preview {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
    min-height: 0;
  }
  .keyword-tag {
    background: rgba(124,92,58,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    animation: tagIn 0.15s ease;
  }
  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .keyword-file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .btn-kw-file {
    position: relative;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    cursor: pointer;
    transition: border-color 0.2s;
    white-space: nowrap;
    overflow: hidden;
  }
  .btn-kw-file:hover { border-color: var(--accent); }
  .btn-kw-file input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .kw-file-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 8px; }

  .card { transition: border-color 0.2s, background 0.2s; }
  .card.dragover {
    border-color: var(--accent);
    background: rgba(124,92,58,0.04);
  }

  .btn-search {
    width: 100%;
    max-width: 680px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }
  .btn-search:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-search:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 680px;
    overflow: hidden;
    display: none;
  }
  .results-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .results-header span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .results-summary { font-size: 0.82rem; color: var(--muted); }

  .result-item {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-item:last-child { border-bottom: none; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.found    { background: var(--found);    box-shadow: 0 0 8px var(--found); }
  .status-dot.notfound { background: var(--notfound); box-shadow: 0 0 8px var(--notfound); }

  .result-info { flex: 1; }
  .result-keyword { font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; }
  .result-files   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .result-count   { font-size: 0.78rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

  .result-badge {
    font-size: 0.75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px;
  }
  .result-badge.found    { background: rgba(58,124,92,0.1);  color: var(--found);    border: 1px solid rgba(58,124,92,0.3); }
  .result-badge.notfound { background: rgba(192,57,43,0.1);  color: var(--notfound); border: 1px solid rgba(192,57,43,0.3); }
</style>
</head>
<body>

<div class="header">
  <h1># 업무자동화 : 트리거 #</h1>
  <p>텍스트 파일에서 특정 키워드 존재 여부 확인 (대소문자 구분 없음)</p>
  <p style="margin-top:10px; font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--muted); letter-spacing:1px;">v20260318 &nbsp;·&nbsp; by jwcho</p>
</div>

<!-- 파일 업로드 -->
<div class="card">
  <div class="card-title">01. 배포 파일 선택</div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple>
    <div class="drop-icon"></div>
    <div class="drop-text"><span>클릭</span> 또는 파일을 여기에 드래그하세요</div>
    <div class="drop-text" style="font-size:0.8rem;margin-top:4px;">모든 파일 형식 지원 · 여러 파일 동시 업로드 가능</div>
    <div class="file-name" id="fileName"></div>
  </div>
</div>

<!-- 키워드 입력 -->
<div class="card" id="kwCard">
  <div class="card-title">02. 트리거 사용 테이블 목록 선택</div>
  <div class="keyword-file-row">
    <div class="btn-kw-file">
      파일에서 불러오기
      <input type="file" id="kwFileInput">
    </div>
    <span class="kw-file-name" id="kwFileName">키워드가 담긴 파일을 선택하거나 드래그하세요</span>
  </div>
  <textarea class="keyword-textarea" id="keywordInput"
    placeholder="ex1) 테이블1, 테이블2
ex2) 테이블1
     테이블2

"></textarea>
  <div class="keyword-preview" id="keywordPreview"></div>
  <div class="hint">입력한 키워드가 태그로 미리보기됩니다 · 파일을 카드 위로 드래그해도 됩니다</div>
</div>

<!-- 검색 버튼 -->
<button class="btn-search" id="searchBtn" onclick="runSearch()" disabled>검색 실행</button>

<!-- 결과 -->
<div class="results-card" id="resultsCard">
  <div class="results-header">
    <span>검색 결과</span>
    <div class="results-summary" id="resultsSummary"></div>
  </div>
  <div id="resultsList"></div>
</div>

<script>
  let fileContents = {};

  const fileInput = document.getElementById('fileInput');
  const dropZone  = document.getElementById('dropZone');

  fileInput.addEventListener('change', e => loadFiles(e.target.files));
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) loadFiles(e.dataTransfer.files);
  });

  function readFileWithEncoding(file, callback) {
    const reader = new FileReader();
    reader.onload = ev => {
      const bytes = new Uint8Array(ev.target.result);
      // EUC-KR 감지: 0xA1~0xFE 범위 2바이트 시퀀스 체크
      let eucKrScore = 0;
      for (let i = 0; i < Math.min(bytes.length - 1, 4000); i++) {
        if (bytes[i] >= 0xA1 && bytes[i] <= 0xFE &&
            bytes[i+1] >= 0xA1 && bytes[i+1] <= 0xFE) eucKrScore++;
      }
      // UTF-8 BOM 체크
      const hasUtf8Bom = bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF;
      const encoding = (!hasUtf8Bom && eucKrScore > 5) ? 'EUC-KR' : 'UTF-8';
      const decoder = new TextDecoder(encoding);
      callback(decoder.decode(ev.target.result));
    };
    reader.readAsArrayBuffer(file);
  }

  function loadFiles(files) {
    fileContents = {};
    document.getElementById('fileName').style.display = 'none';
    let loaded = 0;
    Array.from(files).forEach(file => {
      readFileWithEncoding(file, text => {
        fileContents[file.name] = text.toLowerCase();
        if (++loaded === files.length) {
          const names = Object.keys(fileContents);
          document.getElementById('fileName').textContent =
            names.length === 1 ? '?? ' + names[0] : `?? ${names.length}개 파일 로드됨: ${names.join(', ')}`;
          document.getElementById('fileName').style.display = 'block';
          checkReady();
        }
      });
    });
  }

  // 키워드 파일 불러오기 (클릭)
  const kwFileInput = document.getElementById('kwFileInput');
  kwFileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    loadKwFile(file);
  });

  // 키워드 카드 드래그 앤 드롭
  const kwCard = document.getElementById('kwCard');
  kwCard.addEventListener('dragover', e => { e.preventDefault(); kwCard.classList.add('dragover'); });
  kwCard.addEventListener('dragleave', e => { if (!kwCard.contains(e.relatedTarget)) kwCard.classList.remove('dragover'); });
  kwCard.addEventListener('drop', e => {
    e.preventDefault();
    kwCard.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) loadKwFile(file);
  });

  function loadKwFile(file) {
    readFileWithEncoding(file, text => {
      keywordInput.value = text;
      document.getElementById('kwFileName').textContent = '?? ' + file.name;
      keywordInput.dispatchEvent(new Event('input'));
    });
  }

  // 키워드 실시간 파싱
  const keywordInput   = document.getElementById('keywordInput');
  const keywordPreview = document.getElementById('keywordPreview');

  function getKeywords() {
    return keywordInput.value
      .split(/[,\n]/)
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  keywordInput.addEventListener('input', () => {
    const kws = getKeywords();
    keywordPreview.innerHTML = kws.map(k => `<span class="keyword-tag">${k}</span>`).join('');
    checkReady();
  });

  function checkReady() {
    document.getElementById('searchBtn').disabled =
      !(Object.keys(fileContents).length > 0 && getKeywords().length > 0);
  }

  function countOccurrences(text, kw) {
    let count = 0, pos = 0;
    while ((pos = text.indexOf(kw, pos)) !== -1) { count++; pos += kw.length; }
    return count;
  }

  function runSearch() {
    const keywords = getKeywords().map(k => k.toLowerCase());
    if (!Object.keys(fileContents).length || !keywords.length) return;

    const results = keywords.map(kw => {
      const foundFiles = [];
      let totalCount = 0;
      Object.entries(fileContents).forEach(([name, text]) => {
        const count = countOccurrences(text, kw);
        if (count > 0) { foundFiles.push({ name, count }); totalCount += count; }
      });
      return { kw, found: foundFiles.length > 0, files: foundFiles, count: totalCount };
    });

    renderResults(results);
  }

  function renderResults(results) {
    const card    = document.getElementById('resultsCard');
    const list    = document.getElementById('resultsList');
    const summary = document.getElementById('resultsSummary');

    const foundCount = results.filter(r => r.found).length;
    summary.textContent = `총 ${results.length}개 · 발견 ${foundCount}개 · 미발견 ${results.length - foundCount}개`;

    list.innerHTML = '';
    results.forEach((r, i) => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.style.animationDelay = `${i * 0.05}s`;
      const fileList = r.files.map(f => `${f.name}(${f.count}회)`).join(', ');
      item.innerHTML = `
        <div class="status-dot ${r.found ? 'found' : 'notfound'}"></div>
        <div class="result-info">
          <div class="result-keyword">${r.kw}</div>
          ${r.found ? `<div class="result-files">${fileList}</div>` : ''}
        </div>
        ${r.found ? `<div class="result-count">${r.count}회 발견</div>` : ''}
        <div class="result-badge ${r.found ? 'found' : 'notfound'}">${r.found ? '존재' : '없음'}</div>
      `;
      list.appendChild(item);
    });

    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
