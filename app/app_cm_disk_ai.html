<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPA : DISK AI</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<!-- 공통 디자인 토큰 (컬러 변수) — 레이아웃/배치는 아래 style에서 원본 그대로 유지 -->
<link rel="stylesheet" href="../theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
/* :root 변수는 theme.css에서 관리 */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 16px 80px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── 헤더 ── */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeUp 0.6s ease both;
}
.header h1 {
  font-family: var(--font);
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--accent);
}
.header .sub {
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 300;
  margin-top: 7px;
}
.header .ver {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 10px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px 28px;
  width: 100%;
  max-width: 860px;
  margin-bottom: 18px;
  animation: fadeUp 0.6s ease both;
}
.card:nth-child(2) { animation-delay: 0.08s; }
.card:nth-child(3) { animation-delay: 0.16s; }

.card-title {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── 설정 행 ── */
.settings-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 140px;
}
.field.wide { flex: 2; min-width: 250px; }

.field label {
  font-family: var(--font);
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.field input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--font);
  font-size: 0.85rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); opacity: 0.6; }

/* ── 드롭존 ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  margin-bottom: 14px;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: var(--accent);
  background: rgba(124,92,58,0.04);
}
.drop-zone input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-text { font-size: 0.88rem; color: var(--muted); }
.drop-text span { color: var(--accent); font-weight: 700; }
.drop-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

/* 이미지 미리보기 */
#imagePreview {
  display: none;
  max-width: 100%;
  max-height: 200px;
  margin: 10px auto;
  border-radius: 6px;
  border: 1px solid var(--border);
}

/* ── textarea ── */
textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  resize: vertical;
  min-height: 160px;
  line-height: 1.7;
  transition: border-color 0.2s;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }

.hint {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 8px;
}

/* ── 실행 버튼 ── */
.btn-run {
  width: 100%;
  max-width: 860px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
  letter-spacing: 1px;
  margin-bottom: 20px;
  animation: fadeUp 0.6s 0.24s ease both;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.btn-run:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
.btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

/* 로딩 스피너 */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 결과 카드 ── */
.result-card {
  display: none;
  width: 100%;
  max-width: 860px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
  margin-bottom: 18px;
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
}
.result-header-title {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* ── 예측 요약 배지 ── */
.summary-badges {
  display: flex;
  gap: 10px;
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.badge {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  flex: 1;
  min-width: 150px;
}
.badge-label {
  font-family: var(--font);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.badge-value {
  font-family: var(--font);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
}
.badge.danger  { border-color: rgba(192,57,43,0.4);  background: rgba(192,57,43,0.05); }
.badge.warn    { border-color: rgba(230,126,34,0.4);  background: rgba(230,126,34,0.05); }
.badge.ok      { border-color: rgba(58,124,92,0.4);   background: rgba(58,124,92,0.05); }
.badge.danger .badge-value { color: var(--danger); }
.badge.warn    .badge-value { color: var(--warn); }
.badge.ok      .badge-value { color: var(--found); }

/* ── 범례 안내 ── */
.legend-guide {
  display: flex;
  gap: 20px;
  padding: 10px 22px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: rgba(242,236,227,0.5);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font);
  font-size: 0.75rem;
}
.legend-line {
  width: 28px;
  height: 3px;
  border-radius: 2px;
}
.legend-line.warn-line {
  background: rgba(230,126,34,0.9);
  border-top: 2px dashed rgba(230,126,34,0.9);
  height: 0;
}
.legend-line.danger-line {
  background: rgba(192,57,43,0.9);
  border-top: 2px dashed rgba(192,57,43,0.9);
  height: 0;
}
.legend-label-warn  { color: var(--warn); font-weight: 600; }
.legend-label-danger { color: var(--danger); font-weight: 600; }

/* ── 차트 영역 ── */
.chart-wrap {
  padding: 20px 22px;
}
canvas#myChart {
  width: 100% !important;
}

/* ── 다운로드 버튼 ── */
.btn-row {
  display: flex;
  gap: 8px;
  padding: 0 22px 18px;
  justify-content: flex-end;
}
.btn-dl {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-family: var(--font);
  font-size: 0.78rem;
  color: var(--accent);
  cursor: pointer;
  transition: border-color 0.2s;
}
.btn-dl:hover { border-color: var(--accent); }
.btn-dl.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-dl.primary:hover { opacity: 0.85; }

/* ── 에러 ── */
.error-msg {
  display: none;
  background: rgba(192,57,43,0.08);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: var(--font);
  font-size: 0.8rem;
  color: var(--danger);
  margin-top: 12px;
  width: 100%;
  max-width: 860px;
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1># BPA : DISK AI #</h1>
  <div class="sub">AI가 이미지나 텍스트를 분석하여 디스크 부족 시점을 예측합니다</div>
  <div class="ver">v20260323 &nbsp;·&nbsp; by jwcho &nbsp;·&nbsp; AI</div>
</div>

<!-- 01. 설정 -->
<div class="card">
  <div class="card-title">01. 기본 설정 및 AI 연동</div>
  <div class="settings-row">
    <div class="field wide">
      <label>Gemini API Key (1.5 Flash)</label>
      <input type="password" id="apiKey" placeholder="AI 분석을 위해 API 키를 입력하세요">
    </div>
    <div class="field">
      <label>전체 용량 (GB)</label>
      <input type="number" id="totalDisk" placeholder="ex) 1000" min="1">
    </div>
    <div class="field">
      <label>임계치 (%)</label>
      <input type="number" id="threshold" placeholder="ex) 90" min="1" max="100" value="90">
    </div>
  </div>
</div>

<!-- 02. 데이터 입력 -->
<div class="card">
  <div class="card-title">
    02. 데이터 입력 (이미지/텍스트)
    <span id="aiStatus" style="font-size: 0.65rem; color: var(--found); font-weight: normal; text-transform: none; display: none;">AI가 이미지를 분석 중입니다...</span>
  </div>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".csv,.txt,image/*">
    <div class="drop-text"><span>클릭</span>, 이미지 <span>붙여넣기(Ctrl+V)</span> 또는 파일을 드래그하세요</div>
    <div class="drop-sub">CSV · TXT · 이미지(캡쳐본) 지원</div>
    <img id="imagePreview" alt="미리보기">
  </div>
  <textarea id="dataInput" placeholder="이미지를 붙여넣으면 AI가 자동으로 텍스트를 추출합니다.&#10;직접 입력 시: 날짜, 사용량(GB) 형식&#10;&#10;예시)&#10;2024-01, 120&#10;2024-02, 135"></textarea>
  <div class="hint">AI 팁: 표 형식의 캡쳐본을 넣으면 정확도가 가장 높습니다.</div>
</div>

<!-- 실행 버튼 -->
<button class="btn-run" id="runBtn" onclick="runAnalysis()">
  <span class="spinner" id="btnSpinner"></span>
  <span id="btnText">예측 분석 실행</span>
</button>

<!-- 에러 -->
<div class="error-msg" id="errorMsg"></div>

<!-- 결과 카드 (기존과 동일) -->
<div class="result-card" id="resultCard">
  <div class="result-header">
    <span class="result-header-title">예측 결과</span>
    <span id="resultMeta" style="font-family:var(--font);font-size:0.75rem;color:var(--muted);"></span>
  </div>
  <div class="summary-badges" id="summaryBadges"></div>
  <div class="legend-guide">
    <div class="legend-item"><div class="legend-line warn-line"></div><span class="legend-label-warn">증설 필수</span></div>
    <div class="legend-item"><div class="legend-line danger-line"></div><span class="legend-label-danger">디스크 부족</span></div>
  </div>
  <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  <div class="btn-row">
    <button class="btn-dl" onclick="downloadCSV()">↓ CSV</button>
    <button class="btn-dl primary" onclick="downloadPNG()">↓ PNG 저장</button>
  </div>
</div>

<script>
/* ====================================
   전역 및 초기화
==================================== */
let chartInstance = null;
let lastParsed    = null;
let isAiLoading   = false;

const dataInput = document.getElementById("dataInput");
const dz = document.getElementById("dropZone");
const imgPreview = document.getElementById("imagePreview");
const aiStatus = document.getElementById("aiStatus");
const runBtn = document.getElementById("runBtn");
const btnSpinner = document.getElementById("btnSpinner");
const btnText = document.getElementById("btnText");

/* ── 이미지/파일 처리 ── */
dz.addEventListener("dragover",  e => { e.preventDefault(); dz.classList.add("dragover"); });
dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
dz.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
});
document.getElementById("fileInput").addEventListener("change", e => {
  handleFile(e.target.files[0]);
});

// 클립보드 이미지 붙여넣기 지원
window.addEventListener('paste', e => {
  const items = e.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf("image") !== -1) {
      const blob = items[i].getAsFile();
      handleFile(blob);
    }
  }
});

async function handleFile(file) {
  if (!file) return;
  hideError();

  if (file.type.startsWith("image/")) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      imgPreview.src = e.target.result;
      imgPreview.style.display = "block";
      const base64Data = e.target.result.split(',')[1];
      await analyzeImageWithGemini(base64Data);
    };
    reader.readAsDataURL(file);
  } else {
    // 텍스트/CSV 파일
    imgPreview.style.display = "none";
    const reader = new FileReader();
    reader.onload = e => { dataInput.value = e.target.result.trim(); };
    reader.readAsText(file, "utf-8");
  }
}

/* ====================================
   Gemini AI 연동
==================================== */
async function analyzeImageWithGemini(base64Image) {
  const apiKey = document.getElementById("apiKey").value.trim();
  if (!apiKey) {
    showError("이미지 분석을 위해 상단에 Gemini API Key를 입력해주세요.");
    return;
  }

  setAiLoading(true);

  const prompt = `
    이 이미지에서 날짜(기간)와 디스크 사용량(또는 데이터량) 데이터를 추출해서 
    CSV 형식(날짜, 용량GB)으로만 답변해줘. 
    헤더는 제외하고 데이터만 보여줘. 
    용량 단위가 TB라면 GB로 변환해서 숫자만 적어줘.
    예:
    2024-01, 150
    2024-02, 180
  `;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
          ]
        }]
      })
    });

    const result = await response.json();
    if (result.error) throw new Error(result.error.message);

    const extractedText = result.candidates[0].content.parts[0].text;
    dataInput.value = extractedText.trim();
    
  } catch (err) {
    showError("AI 분석 실패: " + err.message);
  } finally {
    setAiLoading(false);
  }
}

function setAiLoading(loading) {
  isAiLoading = loading;
  if (loading) {
    aiStatus.style.display = "inline";
    btnSpinner.style.display = "inline-block";
    btnText.textContent = "AI 분석 중...";
    runBtn.disabled = true;
  } else {
    aiStatus.style.display = "none";
    btnSpinner.style.display = "none";
    btnText.textContent = "예측 분석 실행";
    runBtn.disabled = false;
  }
}

/* ====================================
   기존 분석 로직 (디자인 및 계산 유지)
==================================== */
function parseData(raw) {
  const lines = raw.trim().split(/\r?\n/).filter(l => l.trim());
  const labels = [], values = [];
  for (const line of lines) {
    const parts = line.split(/[,\t]+/).map(p => p.trim().replace(/^["']|["']$/g, ""));
    if (parts.length < 2) continue;
    const val = parseFloat(parts[1].replace(/[^\d.-]/g, ""));
    if (isNaN(val)) continue;
    labels.push(parts[0]);
    values.push(val);
  }
  if (values.length < 2) throw new Error("데이터가 2행 이상 필요합니다.");
  return { labels, values };
}

function linearRegression(values) {
  const n = values.length;
  const xs = values.map((_, i) => i);
  const sumX  = xs.reduce((a, b) => a + b, 0);
  const sumY  = values.reduce((a, b) => a + b, 0);
  const sumXY = xs.reduce((a, x, i) => a + x * values[i], 0);
  const sumX2 = xs.reduce((a, x) => a + x * x, 0);
  const slope     = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX ** 2);
  const intercept = (sumY - slope * sumX) / n;
  return { slope, intercept };
}

function parseYearMonth(label) {
  let m = label.match(/(\d{4})[-\/](\d{1,2})/);
  if (m) return { year: +m[1], month: +m[2] };
  m = label.match(/(\d{4})년\s*(\d{1,2})월/);
  if (m) return { year: +m[1], month: +m[2] };
  m = label.match(/^(\d{4})(\d{2})$/);
  if (m) return { year: +m[1], month: +m[2] };
  return null;
}

function addMonthLabel(baseYear, baseMonth, offsetMonths) {
  const total = (baseYear * 12 + (baseMonth - 1)) + offsetMonths;
  const y = Math.floor(total / 12);
  const mo = (total % 12) + 1;
  return `${y}년${String(mo).padStart(2, "0")}월`;
}

function runAnalysis() {
  hideError();
  const raw = dataInput.value;
  const totalDisk = parseFloat(document.getElementById("totalDisk").value);
  const threshold = parseFloat(document.getElementById("threshold").value) || 90;

  if (!totalDisk) { showError("전체 디스크 용량을 입력해주세요."); return; }

  const warnGB = totalDisk * (threshold / 100);
  const fullGB = totalDisk;

  try {
    const { labels, values } = parseData(raw);
    const { slope, intercept } = linearRegression(values);
    const lastLabel = labels[labels.length - 1];
    const baseDate  = parseYearMonth(lastLabel);

    const normalizedLabels = labels.map(lbl => {
      const parsed = parseYearMonth(lbl);
      return parsed ? `${parsed.year}년${String(parsed.month).padStart(2, "0")}월` : lbl;
    });

    const predLabels = [...normalizedLabels];
    const predValues = [];
    let exIdxWarn = null, exLabelWarn = null, exIdxFull = null, exLabelFull = null;

    for (let i = values.length; i < values.length + 48; i++) {
      const predicted = +(intercept + slope * i).toFixed(2);
      predValues.push(predicted);
      const offset = i - values.length + 1;
      const predLabel = baseDate ? addMonthLabel(baseDate.year, baseDate.month, offset) : `+${offset}개월`;
      predLabels.push(predLabel);

      if (exIdxWarn === null && predicted >= warnGB) { exIdxWarn = i; exLabelWarn = predLabel; }
      if (exIdxFull === null && predicted >= fullGB) { exIdxFull = i; exLabelFull = predLabel; }
      if (exIdxFull !== null && i > exIdxFull + 3) break;
    }

    lastParsed = { labels: normalizedLabels, values, predLabels, predValues, slope, intercept, totalDisk, threshold, warnGB, fullGB, exhaustIdxWarn: exIdxWarn, exhaustLabelWarn: exLabelWarn, exhaustIdxFull: exIdxFull, exhaustLabelFull: exLabelFull };
    
    renderChart(lastParsed);
    renderSummary(lastParsed);

    document.getElementById("resultMeta").textContent = `데이터 ${values.length}개 분석됨  ·  월 평균 ${slope >= 0 ? "+" : ""}${slope.toFixed(1)} GB 증가`;
    document.getElementById("resultCard").style.display = "block";
    document.getElementById("resultCard").scrollIntoView({ behavior: "smooth", block: "start" });

  } catch (err) {
    showError(err.message);
  }
}

function renderSummary(d) {
  const container = document.getElementById("summaryBadges");
  container.innerHTML = "";
  const lastVal = d.values[d.values.length - 1];
  const usePct = ((lastVal / d.totalDisk) * 100).toFixed(1);

  const badges = [
    { label: "현재 사용량", value: `${lastVal.toFixed(1)} GB (${usePct}%)`, cls: usePct >= d.threshold ? "danger" : usePct >= d.threshold * 0.8 ? "warn" : "ok" },
    { label: "월 평균 증가", value: `${d.slope >= 0 ? "+" : ""}${d.slope.toFixed(1)} GB`, cls: d.slope > 0 ? "warn" : "ok" },
    { label: `증설 필요 (${d.threshold}%)`, value: d.exhaustLabelWarn || "안전", cls: d.exhaustLabelWarn ? "warn" : "ok" },
    { label: `디스크 부족 (100%)`, value: d.exhaustLabelFull || "안전", cls: d.exhaustLabelFull ? "danger" : "ok" }
  ];

  badges.forEach(b => {
    const el = document.createElement("div");
    el.className = `badge ${b.cls}`;
    el.innerHTML = `<span class="badge-label">${b.label}</span><span class="badge-value">${b.value}</span>`;
    container.appendChild(el);
  });
}

function renderChart(d) {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById("myChart").getContext("2d");
  const n = d.values.length;

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: d.predLabels,
      datasets: [
        { label: "실측 사용량", data: d.predLabels.map((_, i) => i < n ? d.values[i] : null), backgroundColor: "rgba(124,92,58,0.6)", order: 3 },
        { label: "예측 사용량", data: d.predLabels.map((_, i) => i >= n - 1 ? +(d.intercept + d.slope * i).toFixed(2) : null), backgroundColor: "rgba(124,92,58,0.15)", order: 3 },
        { label: "추세선", data: d.predLabels.map((_, i) => +(d.intercept + d.slope * i).toFixed(2)), type: "line", borderColor: "rgba(58,124,92,0.8)", borderWidth: 2, pointRadius: 0, fill: false, order: 2 },
        { label: "증설 임계치", data: d.predLabels.map(() => d.warnGB), type: "line", borderColor: "rgba(230,126,34,0.8)", borderWidth: 2, borderDash: [5, 5], pointRadius: 0, order: 1 },
        { label: "용량 부족", data: d.predLabels.map(() => d.fullGB), type: "line", borderColor: "rgba(192,57,43,0.8)", borderWidth: 2, borderDash: [5, 5], pointRadius: 0, order: 1 }
      ]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: false, ticks: { callback: v => v + " GB" } }
      },
      plugins: {
        tooltip: { mode: 'index', intersect: false }
      }
    },
    plugins: [{
      id: 'customAnnotations',
      afterDraw: (chart) => {
        const {ctx, scales: {x, y}} = chart;
        const drawCallout = (idx, label, color) => {
          if (idx === null) return;
          const xPos = x.getPixelForValue(idx);
          ctx.save();
          ctx.strokeStyle = color;
          ctx.setLineDash([5, 5]);
          ctx.beginPath(); ctx.moveTo(xPos, chart.chartArea.top); ctx.lineTo(xPos, chart.chartArea.bottom); ctx.stroke();
          ctx.fillStyle = color;
          ctx.font = "bold 11px Pretendard";
          ctx.fillText(label, xPos + 5, chart.chartArea.top + 15);
          ctx.restore();
        };
        drawCallout(d.exhaustIdxWarn, "증설필요", "#e67e22");
        drawCallout(d.exhaustIdxFull, "용량부족", "#c0392b");
      }
    }]
  });
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = "? " + msg;
  el.style.display = "block";
}
function hideError() { document.getElementById("errorMsg").style.display = "none"; }

function downloadPNG() {
  const canvas = document.getElementById("myChart");
  const link = document.createElement("a");
  link.download = "disk_analysis.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function downloadCSV() {
  if (!lastParsed) return;
  let csv = "\uFEFF기간,사용량(GB),구분\n";
  lastParsed.predLabels.forEach((lbl, i) => {
    const val = i < lastParsed.values.length ? lastParsed.values[i] : (lastParsed.intercept + lastParsed.slope * i).toFixed(2);
    const type = i < lastParsed.values.length ? "실측" : "예측";
    csv += `${lbl},${val},${type}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "disk_data.csv";
  link.click();
}
</script>
