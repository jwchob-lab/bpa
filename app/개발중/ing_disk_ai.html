<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI-Free Disk Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        #drop-zone { height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: #f9f9f9; }
        #log { font-size: 12px; color: #666; max-height: 150px; overflow-y: auto; background: #eee; padding: 10px; margin-top: 10px; }
        .result-box { margin-top: 20px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>?? AI 없이 이미지 분석하기 (OCR 방식)</h2>
    <p>이미지를 붙여넣거나 클릭하여 업로드하세요. 숫자를 추출하여 1년 예측을 수행합니다.</p>
    
    <div id="drop-zone">이곳에 이미지 붙여넣기 (Ctrl+V) 또는 클릭</div>
    <input type="file" id="fileInput" style="display:none" accept="image/*">

    <div id="status">대기 중...</div>
    <div id="log"></div>

    <div class="result-box" id="resultText"></div>
    <canvas id="diskChart"></canvas>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    let chart = null;

    // 1. 이미지 입력 처리
    window.addEventListener('paste', e => handleFile(e.clipboardData.files[0]));
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = e => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file) return;
        status.innerText = "이미지 분석 중... (로컬 OCR 구동)";
        log.innerText = "";
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            const image = e.target.result;
            analyzeImage(image);
        };
        reader.readAsDataURL(file);
    }

    // 2. OCR 분석 (Tesseract.js)
    async function analyzeImage(image) {
        try {
            const result = await Tesseract.recognize(image, 'eng', {
                logger: m => { if(m.status === 'recognizing text') log.innerText += `\n진행도: ${(m.progress*100).toFixed(0)}%`; }
            });

            const text = result.data.text;
            log.innerText = "\n--- 추출된 전체 텍스트 ---\n" + text;

            // 3. 숫자 추출 로직 (정규표현식)
            // 이미지에서 '숫자%' 또는 '숫자 GB' 형태를 찾으려고 시도합니다.
            const numbers = text.match(/\d+(\.\d+)?/g); 
            
            if (numbers && numbers.length >= 1) {
                const currentUsage = parseFloat(numbers[0]); // 첫 번째 숫자를 현재 사용량으로 가정
                const growthBase = numbers.length >= 2 ? parseFloat(numbers[1]) : currentUsage * 0.05; // 두 번째 숫자가 없으면 5% 증가로 가정
                
                document.getElementById('resultText').innerText = 
                    `분석 결과: 현재 ${currentUsage}, 월평균 증가량 ${growthBase.toFixed(1)} 추출됨`;
                
                drawChart(currentUsage, growthBase);
            } else {
                alert("이미지에서 숫자를 찾지 못했습니다. 화질을 확인해주세요.");
            }
        } catch (err) {
            console.error(err);
            status.innerText = "분석 실패";
        }
    }

    // 4. 차트 그리기
    function drawChart(current, growth) {
        const labels = [];
        const data90 = [];
        const data100 = [];
        const predict = [];
        const now = new Date();

        for (let i = 0; i <= 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
            labels.push(`${d.getFullYear()}-${d.getMonth()+1}`);
            predict.push((current + (growth * i)).toFixed(1));
            data90.push(90); // 퍼센트 기준일 때 예시
            data100.push(100);
        }

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('diskChart'), {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { label: '예측 사용량', data: predict, borderColor: 'blue' },
                    { label: '90% 경고', data: data90, borderColor: 'orange', borderDash: [5,5] },
                    { label: '100% 한계', data: data100, borderColor: 'red', borderDash: [5,5] }
                ]
            }
        });
        status.innerText = "분석 및 차트 생성 완료";
    }
</script>
</body>
</html>
