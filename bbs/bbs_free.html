<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Supabase 게시판</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
    button { padding: 8px 12px; cursor: pointer; }
    .post { border-bottom: 1px solid #ddd; padding: 10px 0; }
  </style>
</head>
<body>

<h2>?? 게시판</h2>

<!-- 글 작성 -->
<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<button onclick="writePost()">등록</button>

<hr>

<!-- 글 목록 -->
<div id="posts">로딩중...</div>

<script>
  // ?? 본인 값으로 변경
  const supabaseUrl = 'https://plhwwbjigsaypidcobrd.supabase.co'
  const supabaseKey = 'sb_publishable_yffSFbC1kkBw8vKMSXQzeA_qWoG3YIp'

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

  // ?? 글 목록 조회
  async function loadPosts() {
    const postsDiv = document.getElementById('posts')
    postsDiv.innerHTML = '불러오는 중...'

    const { data, error } = await supabase
      .from('posts')
      .select('*')
      .order('id', { ascending: false })

    if (error) {
      console.error('조회 에러:', error)
      postsDiv.innerHTML = '? 조회 실패: ' + error.message
      return
    }

    console.log('조회 데이터:', data)

    if (!data || data.length === 0) {
      postsDiv.innerHTML = '?? 데이터 없음'
      return
    }

    postsDiv.innerHTML = ''

    data.forEach(post => {
      const div = document.createElement('div')
      div.className = 'post'
      div.innerHTML = `
        <h3>${post.title ?? ''}</h3>
        <p>${post.content ?? ''}</p>
        <small>${post.created_at ?? ''}</small>
      `
      postsDiv.appendChild(div)
    })
  }

  // ?? 글 작성
  async function writePost() {
    const title = document.getElementById('title').value.trim()
    const content = document.getElementById('content').value.trim()

    if (!title || !content) {
      alert('제목과 내용을 입력하세요')
      return
    }

    const { error } = await supabase
      .from('posts')
      .insert([{ title, content }])

    if (error) {
      console.error('등록 에러:', error)
      alert('? 등록 실패: ' + error.message)
      return
    }

    alert('? 등록 완료')

    document.getElementById('title').value = ''
    document.getElementById('content').value = ''

    loadPosts()
  }

  // 최초 로딩
  loadPosts()
</script>

</body>
</html>
