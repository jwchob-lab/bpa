<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Supabase 게시판</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
    button { padding: 8px 12px; cursor: pointer; }
    .post { border-bottom: 1px solid #ddd; padding: 10px 0; }
  </style>
</head>
<body>

<h2>?? 게시판</h2>

<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<button id="writeBtn">등록</button>

<hr>

<div id="posts">로딩중...</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  // ?? 반드시 본인 값으로 수정
  const supabaseUrl = 'https://plhwwbjigsaypidcobrd.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsaHd3YmppZ3NheXBpZGNvYnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzE2NTIsImV4cCI6MjA4OTkwNzY1Mn0.AAtgL0e8GSisLDHb_caPM-HrcO3_3W041cq7XHo8BUA'

  const supabase = createClient(supabaseUrl, supabaseKey)

  const postsDiv = document.getElementById('posts')
  const writeBtn = document.getElementById('writeBtn')

  // ?? 글 목록 조회
  async function loadPosts() {
    try {
      postsDiv.innerHTML = '불러오는 중...'

      const { data, error } = await supabase
        .from('posts')
        .select('*')
        .order('id', { ascending: false })

      if (error) throw error

      console.log('조회 성공:', data)

      if (!data || data.length === 0) {
        postsDiv.innerHTML = '?? 데이터 없음'
        return
      }

      postsDiv.innerHTML = ''

      data.forEach(post => {
        const div = document.createElement('div')
        div.className = 'post'
        div.innerHTML = `
          <h3>${post.title ?? ''}</h3>
          <p>${post.content ?? ''}</p>
          <small>${post.created_at ?? ''}</small>
        `
        postsDiv.appendChild(div)
      })

    } catch (err) {
      console.error('조회 실패:', err)
      postsDiv.innerHTML = '? 오류: ' + err.message
    }
  }

  // ?? 글 작성
  async function writePost() {
    try {
      const title = document.getElementById('title').value.trim()
      const content = document.getElementById('content').value.trim()

      if (!title || !content) {
        alert('제목과 내용을 입력하세요')
        return
      }

      const { error } = await supabase
        .from('posts')
        .insert([{ title, content }])

      if (error) throw error

      alert('? 등록 완료')

      document.getElementById('title').value = ''
      document.getElementById('content').value = ''

      loadPosts()

    } catch (err) {
      console.error('등록 실패:', err)
      alert('? 등록 실패: ' + err.message)
    }
  }

  writeBtn.addEventListener('click', writePost)

  // 최초 실행
  loadPosts()
</script>

</body>
</html>
