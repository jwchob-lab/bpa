<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Supabase 게시판</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: auto; }
    input, textarea { width: 100%; margin: 5px 0; padding: 8px; }
    button { padding: 8px 12px; cursor: pointer; }
    .post { border-bottom: 1px solid #ddd; padding: 10px 0; }
  </style>
</head>
<body>

<h2>?? 게시판</h2>

<!-- 글 작성 -->
<input id="title" placeholder="제목">
<textarea id="content" placeholder="내용"></textarea>
<button onclick="writePost()">등록</button>

<hr>

<!-- 글 목록 -->
<div id="posts"></div>

<script>
  // ?? 여기에 본인 값 넣기
  const supabaseUrl = 'https://plhwwbjigsaypidcobrd.supabase.co'
  const supabaseKey = 'sb_publishable_yffSFbC1kkBw8vKMSXQzeA_qWoG3YIp'

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

  // ?? 글 목록 조회
  async function loadPosts() {
    const { data, error } = await supabase
      .from('posts')
      .select('*')
      .order('id', { ascending: false })

    const postsDiv = document.getElementById('posts')
    postsDiv.innerHTML = ''

    data.forEach(post => {
      const div = document.createElement('div')
      div.className = 'post'
      div.innerHTML = `
        <h3>${post.title}</h3>
        <p>${post.content}</p>
        <small>${post.created_at}</small>
      `
      postsDiv.appendChild(div)
    })
  }

  // ?? 글 작성
  async function writePost() {
    const title = document.getElementById('title').value
    const content = document.getElementById('content').value

    if (!title || !content) {
      alert('제목/내용 입력하세요')
      return
    }

    await supabase.from('posts').insert([{ title, content }])

    document.getElementById('title').value = ''
    document.getElementById('content').value = ''

    loadPosts()
  }

  // 최초 로딩
  loadPosts()
</script>

</body>
</html>
